<script type="module">
    import {
        initializeApp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
        getAuth,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
        sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
        getFirestore,
        collection,
        getDocs,
        doc,
        setDoc,
        deleteDoc,
        query,
        where,
        updateDoc,
        addDoc,
        writeBatch,
        serverTimestamp,
        Timestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
        getDatabase,
        ref,
        onValue
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCay_CY1kTHJR51UekskDwgZ_FGUaWml9A",
        authDomain: "eduboard-870d3.firebaseapp.com",
        databaseURL: "https://eduboard-870d3-default-rtdb.firebaseio.com",
        projectId: "eduboard-870d3",
        storageBucket: "eduboard-870d3.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);

    let currentUser = null;
    let allGrades = [];
    let allSubjects = [];
    let currentSection = 'dashboard';

    // --- AUTH ---
    window.handleAdminLogin = async () => {
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            alert("Login Failed: " + error.message);
        }
    };

    window.handleLogout = async () => {
        try {
            await signOut(auth);
            window.location.href = 'index.html';
        } catch (error) {
            console.error("Error signing out:", error);
            alert("Error signing out: " + error.message);
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            document.getElementById('admin-user-display').textContent = user.email;
            initDashboard();
        } else {
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    // --- NAVIGATION ---
    window.showSection = (sectionId) => {
        currentSection = sectionId;
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        const tabs = document.querySelectorAll('.nav-tab');
        const map = {
            'dashboard': 0,
            'grades': 1,
            'subjects': 2,
            'teachers': 3,
            'students': 4,
            'sessions': 5
        };
        if (tabs[map[sectionId]]) tabs[map[sectionId]].classList.add('active');

        if (sectionId === 'grades') loadGrades();
        if (sectionId === 'subjects') loadSubjects();
        if (sectionId === 'teachers') loadTeachers();
        if (sectionId === 'students') loadStudents();
        if (sectionId === 'sessions') loadSessions();
    };

    window.refreshCurrentSection = () => {
        if (currentSection === 'grades') loadGrades();
        else if (currentSection === 'subjects') loadSubjects();
        else if (currentSection === 'teachers') loadTeachers();
        else if (currentSection === 'students') loadStudents();
        else if (currentSection === 'sessions') loadSessions();
        else if (currentSection === 'dashboard') initDashboard();
    };

    // --- DASHBOARD ---
    async function initDashboard() {
        try {
            const [gradesSnap, subjectsSnap, teachersSnap, studentsSnap] = await Promise.all([
                getDocs(collection(db, "grades")),
                getDocs(collection(db, "subjects")),
                getDocs(query(collection(db, "users"), where("role", "==", "teacher"))),
                getDocs(collection(db, "students"))
            ]);
            document.getElementById('dashGrades').textContent = gradesSnap.size;
            document.getElementById('dashSubjects').textContent = subjectsSnap.size;
            document.getElementById('dashTeachers').textContent = teachersSnap.size;
            document.getElementById('dashStudents').textContent = studentsSnap.size;

            allGrades = gradesSnap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));
            allSubjects = subjectsSnap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));
            populateGradeFilter();
        } catch (e) {
            console.error(e);
            alert("Error loading dashboard: " + e.message);
        }

        onValue(ref(rtdb, 'liveSessions'), (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                document.getElementById('cardSessions').textContent = "0";
                document.getElementById('cardActive').textContent = "0";
                return;
            }
            let sCount = 0,
                stCount = 0;
            Object.values(data).forEach(s => {
                sCount++;
                if (s.students) stCount += Object.keys(s.students).length;
            });
            document.getElementById('cardSessions').textContent = sCount;
            document.getElementById('cardActive').textContent = stCount;
        });
    }

    // --- HELPERS ---
    function getDisplayName(d) {
        return d?.name || d?.displayName || "Unnamed";
    }

    function getNameById(id, list) {
        if (!id || !list) return 'N/A';
        const item = list.find(i => i.id === id);
        return item ? (item.nameEn || item.code || id) : id;
    }

    function populateGradeFilter() {
        const sel = document.getElementById('student-grade-filter');
        if (!sel) return;
        sel.innerHTML = '<option value="">All Grades</option>';
        allGrades.forEach(g => sel.innerHTML += `<option value="${g.nameEn}">${g.nameEn}</option>`);
    }

    // --- LOADERS ---
    async function loadGrades() {
        const tbody = document.querySelector('#grades-table tbody');
        tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
        try {
            const snap = await getDocs(collection(db, "grades"));
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${d.nameEn || ''}</td><td>${d.nameAr || ''}</td><td>${d.code || ''}</td>
                        <td><span class="status-badge ${d.status==='Active'?'status-active':'status-inactive'}">${d.status||'Active'}</span></td>
                        <td class="action-btns">
                            <button class="icon-btn" onclick='editItem("grade","${doc.id}",${JSON.stringify(d).replace(/'/g,"&#39;")})'><i class="fas fa-pen"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('grades','${doc.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
        }
    }

    async function loadSubjects() {
        const tbody = document.querySelector('#subjects-table tbody');
        tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
        try {
            const snap = await getDocs(collection(db, "subjects"));
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${d.nameEn || ''}</td><td>${d.nameAr || ''}</td><td>${d.code || ''}</td>
                        <td><span class="status-badge ${d.status==='Active'?'status-active':'status-inactive'}">${d.status||'Active'}</span></td>
                        <td class="action-btns">
                            <button class="icon-btn" onclick='editItem("subject","${doc.id}",${JSON.stringify(d).replace(/'/g,"&#39;")})'><i class="fas fa-pen"></i></button>
                            <button class="icon-btn delete" onclick="deleteItem('subjects','${doc.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
        }
    }

    async function loadTeachers() {
        const tbody = document.querySelector('#teachers-table tbody');
        tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';
        try {
            const snap = await getDocs(query(collection(db, "users"), where("role", "==", "teacher")));
            tbody.innerHTML = '';
            const seenEmails = new Set();
            snap.forEach(doc => {
                const d = doc.data();
                const cleanEmail = (d.email || '').toLowerCase().trim();
                if (!cleanEmail || seenEmails.has(cleanEmail)) return;
                seenEmails.add(cleanEmail);

                const gNames = d.assignedGrades ? d.assignedGrades.map(id => getNameById(id, allGrades)).join(', ') : 'None';
                const sNames = d.assignedSubjects ? d.assignedSubjects.map(id => getNameById(id, allSubjects)).join(', ') : 'None';

                tbody.innerHTML += `
                    <tr>
                        <td>${getDisplayName(d)}</td><td>${d.email}</td>
                        <td style="font-size:0.85rem">${gNames}</td><td style="font-size:0.85rem">${sNames}</td>
                        <td><span class="status-badge ${d.status==='Active'?'status-active':'status-inactive'}">${d.status||'Active'}</span></td>
                        <td class="action-btns">
                            <button class="icon-btn" onclick='editItem("teacher","${doc.id}",${JSON.stringify(d).replace(/'/g,"&#39;")})'><i class="fas fa-pen"></i></button>
                            <button class="icon-btn reset" onclick="resetPassword('${d.email}')"><i class="fas fa-key"></i></button>
                            <button class="icon-btn delete" onclick="deleteTeacher('${doc.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="6">Error loading data</td></tr>';
        }
    }

    async function loadStudents() {
        const filter = document.getElementById('student-grade-filter')?.value || '';
        const tbody = document.querySelector('#students-table tbody');
        tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
        try {
            const snap = await getDocs(collection(db, "students"));
            tbody.innerHTML = '';
            const seenEmails = new Set();
            snap.forEach(doc => {
                const d = doc.data();
                const cleanEmail = (d.email || '').toLowerCase().trim();
                if (!cleanEmail || seenEmails.has(cleanEmail)) return;
                seenEmails.add(cleanEmail);

                let gName = "N/A";
                if (d.gradeLevel) {
                    const g = allGrades.find(x => x.id === d.gradeLevel);
                    if (g) gName = g.nameEn;
                }
                if (filter && gName !== filter) return;

                tbody.innerHTML += `
                    <tr>
                        <td>${d.name||'Unnamed'}</td><td>${d.email}</td><td>${gName}</td>
                        <td><span class="status-badge ${d.status==='Active'?'status-active':'status-inactive'}">${d.status||'Active'}</span></td>
                        <td class="action-btns">
                            <button class="icon-btn" onclick='editItem("student","${doc.id}",${JSON.stringify(d).replace(/'/g,"&#39;")})'><i class="fas fa-pen"></i></button>
                            <button class="icon-btn reset" onclick="resetPassword('${d.email}')"><i class="fas fa-key"></i></button>
                            <button class="icon-btn delete" onclick="deleteStudent('${doc.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
        }
    }

    async function loadSessions() {
        const tbody = document.querySelector('#sessions-table tbody');
        tbody.innerHTML = '<tr><td colspan="7">Loading...</td></tr>';
        try {
            const snap = await getDocs(collection(db, "sessions"));
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const date = d.startTime?.seconds ? new Date(d.startTime.seconds * 1000).toLocaleDateString() : '-';
                tbody.innerHTML += `
                    <tr>
                        <td>${d.title || ''}</td><td>${d.ownerTeacherId?.substring(0,8) || ''}...</td><td>${d.gradeLevel || ''}</td><td>${d.subject || ''}</td><td>${date}</td>
                        <td><span class="status-badge ${d.isActive?'status-active':'status-inactive'}">${d.isActive?'Active':'Closed'}</span></td>
                        <td><button class="icon-btn delete" onclick="deleteItem('sessions','${doc.id}')"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="7">Error loading data</td></tr>';
        }
    }

    // ==========================================
    // EXCEL IMPORT / EXPORT MANAGER (FIXED)
    // ==========================================

    window.downloadTemplate = (type) => {
        const wb = XLSX.utils.book_new();
        let headers = [],
            sampleRow = [];

        if (type === 'grades') {
            headers = ["nameEn", "nameAr", "code", "status"];
            sampleRow = ["Grade 10", "الصف العاشر", "G10", "Active"];
        } else if (type === 'subjects') {
            headers = ["nameEn", "nameAr", "code", "status"];
            sampleRow = ["Mathematics", "الرياضيات", "MATH", "Active"];
        } else if (type === 'teachers') {
            headers = ["name", "email", "status", "assignedGrades", "assignedSubjects"];
            sampleRow = ["John Doe", "john@school.com", "Active", "Grade 9, Grade 10", "Math, Physics"];
        } else if (type === 'students') {
            headers = ["name", "email", "gradeLevel", "status"];
            sampleRow = ["Jane Smith", "jane@school.com", "Grade 9", "Active"];
        } else if (type === 'sessions') {
            headers = ["title", "ownerTeacherId", "gradeLevel", "subject", "startTime", "endTime", "isActive"];
            sampleRow = ["Mock Exam", "teacher@school.com", "Grade 9", "Math", "2023-10-25 09:00", "2023-10-25 10:30", "TRUE"];
        }

        const wsEmpty = XLSX.utils.aoa_to_sheet([headers]);
        XLSX.utils.book_append_sheet(wb, wsEmpty, "Empty_Template");
        const wsSample = XLSX.utils.aoa_to_sheet([headers, sampleRow]);
        XLSX.utils.book_append_sheet(wb, wsSample, "Sample_Data");
        XLSX.writeFile(wb, `${type}_template.xlsx`);
    };

    window.exportCurrentData = async (type) => {
        // Ensure reference data is loaded
        if (allGrades.length === 0) {
            const gradesSnap = await getDocs(collection(db, "grades"));
            allGrades = gradesSnap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));
        }
        if (allSubjects.length === 0) {
            const subjectsSnap = await getDocs(collection(db, "subjects"));
            allSubjects = subjectsSnap.docs.map(d => ({
                id: d.id,
                ...d.data()
            }));
        }

        try {
            let collectionRef = null,
                queryRef = null;

            if (type === 'grades') collectionRef = collection(db, "grades");
            else if (type === 'subjects') collectionRef = collection(db, "subjects");
            else if (type === 'teachers') queryRef = query(collection(db, "users"), where("role", "==", "teacher"));
            else if (type === 'students') collectionRef = collection(db, "students");
            else if (type === 'sessions') collectionRef = collection(db, "sessions");

            let snap;
            if (queryRef) snap = await getDocs(queryRef);
            else if (collectionRef) snap = await getDocs(collectionRef);

            const rawData = snap.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));

            const cleanData = rawData.map(row => {
                // Remove audit fields
                const {
                    createdAt,
                    updatedAt,
                    createdBy,
                    updatedBy,
                    ...cleanRow
                } = row;

                // Resolve IDs to Names for better readability
                if (type === 'teachers') {
                    if (row.assignedGrades) {
                        cleanRow.assignedGrades = row.assignedGrades.map(id => {
                            const g = allGrades.find(x => x.id === id);
                            return g ? g.nameEn : id;
                        }).join(', ');
                    }
                    if (row.assignedSubjects) {
                        cleanRow.assignedSubjects = row.assignedSubjects.map(id => {
                            const s = allSubjects.find(x => x.id === id);
                            return s ? s.nameEn : id;
                        }).join(', ');
                    }
                }
                if (type === 'students' && row.gradeLevel) {
                    const g = allGrades.find(x => x.id === row.gradeLevel);
                    cleanRow.gradeLevel = g ? g.nameEn : row.gradeLevel;
                }
                if (type === 'sessions' && row.startTime?.seconds) {
                    const date = new Date(row.startTime.seconds * 1000);
                    cleanRow.startTime = date.toLocaleString('en-US', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    }).replace(/(\d+)\/(\d+)\/(\d+),/, '$3-$1-$2').replace(',', '');
                }
                if (type === 'sessions' && row.endTime?.seconds) {
                    const date = new Date(row.endTime.seconds * 1000);
                    cleanRow.endTime = date.toLocaleString('en-US', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    }).replace(/(\d+)\/(\d+)\/(\d+),/, '$3-$1-$2').replace(',', '');
                }

                return cleanRow;
            });

            const ws = XLSX.utils.json_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Current_Data");
            XLSX.writeFile(wb, `${type}_export_${new Date().toISOString().split('T')[0]}.xlsx`);
        } catch (err) {
            alert("Export failed: " + err.message);
            console.error(err);
        }
    };

    window.processImport = async (type, input) => {
        const file = input.files[0];
        if (!file) return;

        // Reset input so same file can be selected again
        input.value = '';

        // Ensure reference data is loaded
        if ((type === 'teachers' || type === 'students') && allGrades.length === 0) {
            alert("Please wait for grades to load, or visit Dashboard first");
            return;
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const workbook = XLSX.read(e.target.result, {
                    type: 'array'
                });

                let jsonData = [];
                for (let name of workbook.SheetNames) {
                    const rawJson = XLSX.utils.sheet_to_json(workbook.Sheets[name], {
                        defval: ""
                    });
                    if (rawJson && rawJson.length > 0) {
                        jsonData = rawJson;
                        break;
                    }
                }

                if (jsonData.length === 0) {
                    alert("No data found in the Excel file.");
                    return;
                }

                // Normalize headers (trim spaces, lowercase)
                const normalizedData = jsonData.map(row => {
                    const newRow = {};
                    Object.keys(row).forEach(key => {
                        const cleanKey = key.trim().toLowerCase().replace(/\s+/g, '');
                        newRow[cleanKey] = row[key];
                    });
                    return newRow;
                });

                // Process in smaller batches to avoid Firebase limits
                const BATCH_SIZE = 400;
                let totalInsert = 0,
                    totalUpdate = 0,
                    totalSkip = 0;
                const now = serverTimestamp();
                const adminUid = currentUser.uid;
                const colName = type === 'teachers' ? 'users' : (type === 'sessions' ? 'sessions' : type);

                // Pre-fetch existing records for lookup to avoid query-in-loop
                let existingMap = new Map();
                if (type === 'grades' || type === 'subjects') {
                    const snap = await getDocs(collection(db, colName));
                    snap.forEach(doc => {
                        const data = doc.data();
                        existingMap.set(data.code?.toLowerCase(), doc.id);
                    });
                } else if (type === 'teachers' || type === 'students') {
                    const snap = await getDocs(collection(db, colName));
                    snap.forEach(doc => {
                        const data = doc.data();
                        if (data.email) existingMap.set(data.email.toLowerCase(), doc.id);
                    });
                }

                let batch = writeBatch(db);
                let batchCount = 0;

                for (let i = 0; i < normalizedData.length; i++) {
                    const row = normalizedData[i];

                    // Skip empty rows
                    if (!row || (!row.nameen && !row.code && !row.email && !row.title && !row.name)) {
                        continue;
                    }

                    let docData = {};
                    let targetId = null;

                    // Build document data based on type
                    if (type === 'grades' || type === 'subjects') {
                        docData = {
                            nameEn: row.nameen || row.name || '',
                            nameAr: row.namear || '',
                            code: String(row.code || '').toUpperCase(),
                            status: row.status || 'Active'
                        };
                        if (!docData.nameEn || !docData.code) {
                            console.warn("Skipping row due to missing nameEn or code:", row);
                            totalSkip++;
                            continue;
                        }

                        // Lookup by code
                        targetId = existingMap.get(docData.code.toLowerCase());
                    } else if (type === 'teachers') {
                        const email = (row.email || '').toLowerCase().trim();
                        if (!email || !email.includes('@')) {
                            totalSkip++;
                            continue;
                        }

                        const gradeIds = resolveNamesToIds(row.assignedgrades || '', allGrades);
                        const subjectIds = resolveNamesToIds(row.assignedsubjects || '', allSubjects);

                        docData = {
                            name: row.name || '',
                            email: email,
                            role: 'teacher',
                            status: row.status || 'Active',
                            assignedGrades: gradeIds,
                            assignedSubjects: subjectIds
                        };
                        targetId = existingMap.get(email);
                    } else if (type === 'students') {
                        const email = (row.email || '').toLowerCase().trim();
                        if (!email || !email.includes('@')) {
                            totalSkip++;
                            continue;
                        }

                        const gradeId = resolveNameToId(row.gradelevel || '', allGrades);
                        docData = {
                            name: row.name || '',
                            email: email,
                            gradeLevel: gradeId,
                            status: row.status || 'Active'
                        };
                        targetId = existingMap.get(email);
                    } else if (type === 'sessions') {
                        let teacherId = row.ownerteacherid || '';
                        if (teacherId && teacherId.includes('@')) {
                            const tSnap = await getDocs(query(collection(db, "users"), where("email", "==", teacherId), where("role", "==", "teacher")));
                            if (!tSnap.empty) teacherId = tSnap.docs[0].id;
                        }

                        // Parse dates properly
                        let startTime = null,
                            endTime = null;
                        if (row.starttime) {
                            const d = new Date(row.starttime);
                            if (!isNaN(d.getTime())) startTime = Timestamp.fromDate(d);
                        }
                        if (row.endtime) {
                            const d = new Date(row.endtime);
                            if (!isNaN(d.getTime())) endTime = Timestamp.fromDate(d);
                        }

                        docData = {
                            title: row.title || '',
                            ownerTeacherId: teacherId,
                            gradeLevel: row.gradelevel || '',
                            subject: row.subject || '',
                            startTime: startTime,
                            endTime: endTime,
                            isActive: String(row.isactive || '').toLowerCase() === 'true' || String(row.status || '').toLowerCase() === 'active'
                        };
                    }

                    // Add audit fields
                    docData.updatedAt = now;
                    docData.updatedBy = adminUid;

                    // Execute batch operation
                    if (targetId) {
                        batch.update(doc(db, colName, targetId), docData);
                        totalUpdate++;
                    } else {
                        docData.createdAt = now;
                        docData.createdBy = adminUid;
                        const newRef = doc(collection(db, colName));
                        batch.set(newRef, docData);
                        totalInsert++;
                    }
                    batchCount++;

                    // Commit batch if size limit reached
                    if (batchCount >= BATCH_SIZE) {
                        await batch.commit();
                        batch = writeBatch(db);
                        batchCount = 0;
                    }
                }

                // Commit final batch
                if (batchCount > 0) {
                    await batch.commit();
                }

                alert(`Import Complete!\nInserted: ${totalInsert}\nUpdated: ${totalUpdate}\nSkipped: ${totalSkip}`);
                refreshCurrentSection();

            } catch (err) {
                alert("Import Failed: " + err.message);
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function resolveNamesToIds(inputString, list) {
        if (!inputString || !list) return [];
        const items = String(inputString).split(',').map(s => s.trim()).filter(s => s);
        const ids = [];
        items.forEach(item => {
            const found = list.find(l =>
                (l.nameEn && l.nameEn.toLowerCase() === item.toLowerCase()) ||
                (l.nameAr && l.nameAr === item) ||
                (l.code && l.code.toLowerCase() === item.toLowerCase())
            );
            if (found) ids.push(found.id);
            else if (item.length > 10) ids.push(item); // Assume it's already an ID
        });
        return ids;
    }

    function resolveNameToId(inputString, list) {
        if (!inputString || !list) return null;
        const str = String(inputString).trim();
        const found = list.find(l =>
            (l.nameEn && l.nameEn.toLowerCase() === str.toLowerCase()) ||
            (l.nameAr && l.nameAr === str) ||
            (l.code && l.code.toLowerCase() === str.toLowerCase())
        );
        return found ? found.id : str;
    }

    // --- CRUD ACTIONS ---
    window.resetPassword = async (email) => {
        if (confirm(`Send reset link to ${email}?`)) {
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Password reset email sent!");
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    };

    window.deleteTeacher = async (uid) => {
        if (!confirm("Delete teacher? This cannot be undone.")) return;
        try {
            await deleteDoc(doc(db, "users", uid));
            loadTeachers();
        } catch (e) {
            alert("Error deleting: " + e.message);
        }
    };

    window.deleteStudent = async (id) => {
        if (!confirm("Delete student? This cannot be undone.")) return;
        try {
            await deleteDoc(doc(db, "students", id));
            loadStudents();
        } catch (e) {
            alert("Error deleting: " + e.message);
        }
    };

    window.deleteItem = async (col, id) => {
        if (confirm("Are you sure you want to delete this item?")) {
            try {
                await deleteDoc(doc(db, col, id));
                if (col === 'grades') loadGrades();
                if (col === 'subjects') loadSubjects();
                if (col === 'sessions') loadSessions();
            } catch (e) {
                alert("Error deleting: " + e.message);
            }
        }
    };

    // --- MODAL ---
    window.openModal = (type, id = null, data = null) => {
        const m = document.getElementById('generic-modal');
        const f = document.getElementById('modal-fields');
        document.getElementById('modal-type').value = type;
        document.getElementById('modal-id').value = id || '';
        document.getElementById('modal-title').textContent = (id ? 'Edit ' : 'Add ') + type;

        let html = '';

        if (type === 'grade' || type === 'subject') {
            html = `<div class="form-group"><label>Name (EN) *</label><input name="nameEn" required value="${data?.nameEn || ''}"></div>
                    <div class="form-group"><label>Name (AR) *</label><input name="nameAr" required value="${data?.nameAr || ''}"></div>
                    <div class="form-group"><label>Code *</label><input name="code" required value="${data?.code || ''}"></div>
                    <div class="form-group"><label>Status</label><select name="status">
                        <option value="Active" ${data && data.status === 'Active' ? 'selected' : ''}>Active</option>
                        <option value="Inactive" ${data && data.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                    </select></div>`;
        } else if (type === 'teacher') {
            html = `<div class="form-group"><label>Email *</label><input name="email" type="email" required value="${data?.email || ''}" ${id ? 'disabled' : ''}></div>
                    <div class="form-group"><label>Name *</label><input name="name" required value="${getDisplayName(data)}"></div>
                    <div class="form-group"><label>Status</label><select name="status">
                        <option value="Active" ${data && data.status === 'Active' ? 'selected' : ''}>Active</option>
                        <option value="Inactive" ${data && data.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                    </select></div>`;
        } else if (type === 'student') {
            const opts = allGrades.map(g => `<option value="${g.id}" ${data && data.gradeLevel === g.id ? 'selected' : ''}>${g.nameEn}</option>`).join('') || '<option value="">No grades available</option>';

            html = `<div class="form-group"><label>Email *</label><input name="email" type="email" required value="${data?.email || ''}" ${id ? 'disabled' : ''}></div>
                    <div class="form-group"><label>Name *</label><input name="name" required value="${data?.name || ''}"></div>
                    <div class="form-group"><label>Grade *</label><select name="gradeLevel" required>${opts}</select></div>
                    <div class="form-group"><label>Status</label><select name="status">
                        <option value="Active" ${data && data.status === 'Active' ? 'selected' : ''}>Active</option>
                        <option value="Inactive" ${data && data.status === 'Inactive' ? 'selected' : ''}>Inactive</option>
                    </select></div>`;
        }

        f.innerHTML = html;
        m.classList.add('active');
    };

    window.closeModal = () => document.getElementById('generic-modal').classList.remove('active');
    window.editItem = (t, id, data) => openModal(t, id, data);

    window.handleFormSubmit = async (e) => {
        e.preventDefault();
        const type = document.getElementById('modal-type').value;
        const id = document.getElementById('modal-id').value;
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);

        data.updatedAt = serverTimestamp();
        data.updatedBy = currentUser.uid;

        try {
            if (type === 'grade' || type === 'subject') {
                const col = type + 's';
                if (id) {
                    await updateDoc(doc(db, col, id), data);
                } else {
                    data.createdAt = serverTimestamp();
                    data.createdBy = currentUser.uid;
                    await addDoc(collection(db, col), data);
                }
            } else if (type === 'teacher') {
                const uData = {
                    ...data,
                    role: 'teacher'
                };
                if (id) {
                    delete uData.email; // Don't update email
                    await updateDoc(doc(db, "users", id), uData);
                } else {
                    uData.createdAt = serverTimestamp();
                    uData.createdBy = currentUser.uid;
                    await addDoc(collection(db, "users"), uData);
                }
            } else if (type === 'student') {
                if (id) {
                    delete data.email; // Don't update email
                    await updateDoc(doc(db, "students", id), data);
                } else {
                    data.createdAt = serverTimestamp();
                    data.createdBy = currentUser.uid;
                    await addDoc(collection(db, "students"), data);
                }
            }
            closeModal();
            refreshCurrentSection();
            alert("Saved successfully!");
        } catch (err) {
            alert("Error saving: " + err.message);
        }
    };

    window.filterTable = (id, q) => {
        const f = q.toUpperCase();
        const table = document.getElementById(id);
        if (!table) return;
        const rows = table.getElementsByTagName("tr");
        for (let i = 1; i < rows.length; i++) {
            const txt = rows[i].textContent || rows[i].innerText;
            rows[i].style.display = txt.toUpperCase().indexOf(f) > -1 ? "" : "none";
        }
    };
</script>
