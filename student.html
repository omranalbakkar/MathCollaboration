<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduBoard — Interactive Learning Platform</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['\\(', '\\)'],
                    ['$', '$']
                ]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --gray: #64748b;
            --light-gray: #f8fafc;
            --border: #e2e8f0;
            --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: var(--dark);
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- Utilities --- */
        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Buttons --- */
        .btn {
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-main);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--secondary);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Login Screen --- */
        #loginScreen {
            min-height: 100vh;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            margin-bottom: 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* --- App Layout (Split Screen) --- */
        #app {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header */
        .top-header {
            height: 70px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light-gray);
            padding: 6px 16px;
            border-radius: 50px;
        }

        .avatar-circle {
            width: 36px;
            height: 36px;
            background: var(--gradient-main);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            /* Prevents double scrollbars */
        }

        /* Sidebar (Left) */
        .sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        /* Content Area (Right) */
        .content-area {
            flex: 1;
            background: #f8fafc;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        /* --- Dashboard Components --- */
        .profile-summary {
            background: var(--gradient-main);
            color: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
        }

        .profile-summary h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .grade-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .quiz-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .quiz-item {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .quiz-item:hover:not(.disabled) {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: var(--shadow-sm);
        }

        .quiz-item.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #f1f5f9;
        }

        .quiz-status {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .status-open {
            color: var(--secondary);
        }

        .status-closed {
            color: var(--danger);
        }

        .status-done {
            color: var(--primary);
        }

        /* --- Quiz Interface --- */
        .quiz-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 100px;
            /* Space for footer */
        }

        .quiz-header-card {
            background: white;
            padding: 24px 32px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .question-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-num {
            background: #e0e7ff;
            color: var(--primary-dark);
        }

        .badge-pts {
            background: #fef3c7;
            color: #d97706;
        }

        .q-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: var(--dark);
            margin-bottom: 32px;
            font-weight: 500;
        }

        /* Ensure MathJax scales nicely */
        mjx-container {
            font-size: 110% !important;
        }

        /* Answer Options Styling */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--border);
            padding: 20px;
            border-radius: var(--radius-md);
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn:hover {
            border-color: var(--primary-light);
            background: #f8fafc;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .tf-container {
            display: flex;
            gap: 20px;
        }

        .tf-btn {
            flex: 1;
            padding: 20px;
            font-size: 1.2rem;
        }

        .text-input {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Bottom Navigation Bar */
        .nav-footer {
            position: fixed;
            bottom: 0;
            left: 300px;
            /* Width of sidebar */
            right: 0;
            height: 80px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            right: 40px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(200%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 2000;
            font-weight: 600;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Responsive Adjustments */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 20px;
            }

            .nav-footer {
                left: 0;
                padding: 0 20px;
            }

            .content-area {
                padding: 20px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .q-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Loading Spinner -->
    <div class="spinner-screen flex-center" id="loadingScreen" style="position:fixed; inset:0; background:white; z-index:9999;">
        <div style="text-align:center">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary);"></i>
            <p style="margin-top:16px; color:var(--gray)">Loading EduBoard...</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div style="font-size: 3rem; margin-bottom: 16px;">🎓</div>
            <h2 style="margin-bottom: 8px;">Welcome Back!</h2>
            <p style="color: var(--gray); margin-bottom: 32px;">Sign in to continue your learning journey</p>

            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Student Email">
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" placeholder="Password">
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="window.doStudentLogin()">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
            <div id="loginErr" style="color:var(--danger); margin-top:16px; display:none;"></div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app">
        <!-- Header -->
        <header class="top-header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i> EduBoard
            </div>
            <div class="user-controls">
                <div class="user-info">
                    <div class="avatar-circle" id="studentAvatar">S</div>
                    <span id="studentName" style="font-weight:600;">Student Name</span>
                </div>
                <button class="btn btn-danger" style="padding: 8px 16px; font-size:0.9rem;" onclick="window.exitSession()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div id="sidebarContent">
                    <!-- Dynamic Profile & List will go here -->
                </div>
            </aside>

            <!-- Main Content -->
            <main class="content-area">
                <div id="welcomeScreen"></div>
                <div id="quizScreen" class="hidden"></div>
                <div id="completionScreen" class="hidden"></div>
            </main>
        </div>

        <!-- Sticky Footer Navigation (Only visible during quiz) -->
        <footer class="nav-footer hidden" id="navFooter">
            <button class="btn btn-secondary" id="btnPrev" onclick="window.prevQuestion()">
                <i class="fas fa-chevron-left"></i> Previous
            </button>

            <div style="display:flex; gap:12px;">
                <button class="btn btn-primary" id="btnSave" onclick="window.saveCurrentAnswer()" style="background: var(--dark);">
                    <i class="fas fa-save"></i> Save Answer
                </button>
                <button class="btn btn-primary" id="btnNext" onclick="window.nextQuestion()">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
                <button class="btn btn-success hidden" id="btnFinish" onclick="window.finishQuiz()">
                    <i class="fas fa-check-circle"></i> Submit Quiz
                </button>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: var(--secondary); font-size:1.2rem;"></i>
        <span id="toastMessage">Action Successful</span>
    </div>

    <script type="module">
        import {
            auth,
            db,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            signOut,
            getDoc,
            setDoc,
            doc,
            collection,
            query,
            where,
            getDocs,
            updateDoc
        } from './firebase-config.js';

        window.appState = {
            currentStudent: null,
            studentProfile: null,
            studentGradeName: null,
            availableSessions: [],
            currentSession: null,
            questions: [],
            currentQIndex: 0,
            isSaving: false
        };

        // --- UI Helpers ---
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMsg.textContent = msg;
            if (isError) {
                icon.className = 'fas fa-exclamation-circle';
                icon.style.color = 'var(--danger)';
            } else {
                icon.className = 'fas fa-check-circle';
                icon.style.color = 'var(--secondary)';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // --- Logic Functions ---

        async function getGradeName(gradeLevelId) {
            if (!gradeLevelId || gradeLevelId === 'Not specified') return 'Not specified';
            try {
                const gradeDoc = await getDoc(doc(db, 'grades', gradeLevelId));
                if (gradeDoc.exists()) {
                    const gradeData = gradeDoc.data();
                    return gradeData.nameEn || gradeData.nameAr || gradeLevelId;
                }
            } catch (e) {
                console.warn(e);
            }
            return gradeLevelId;
        }

        function isQuizAccessible(session) {
            const now = new Date();
            if (session.startTime && session.endTime) {
                let startTime, endTime;
                if (session.startTime.toDate) startTime = session.startTime.toDate();
                else if (session.startTime.seconds) startTime = new Date(session.startTime.seconds * 1000);
                else startTime = new Date(session.startTime);

                if (session.endTime.toDate) endTime = session.endTime.toDate();
                else if (session.endTime.seconds) endTime = new Date(session.endTime.seconds * 1000);
                else endTime = new Date(session.endTime);

                return now >= startTime && now <= endTime;
            }
            return session.isActive === true;
        }

        function getQuizStatus(session, studentData) {
            if (studentData?.submitted) return {
                text: 'Completed',
                class: 'status-done',
                icon: 'fa-check'
            };
            if (!isQuizAccessible(session)) return {
                text: 'Closed',
                class: 'status-closed',
                icon: 'fa-lock'
            };
            if (studentData?.answers && Object.keys(studentData.answers).length > 0) return {
                text: 'In Progress',
                class: 'status-open',
                icon: 'fa-pen'
            };
            return {
                text: 'Available',
                class: 'status-open',
                icon: 'fa-play'
            };
        }

        async function loadStudentSessions() {
            const state = window.appState;
            let studentGradeValue = null;

            if (state.studentProfile?.gradeLevel) {
                studentGradeValue = await getGradeName(state.studentProfile.gradeLevel);
            } else if (state.studentProfile?.grade) {
                studentGradeValue = state.studentProfile.grade;
            }

            if (!studentGradeValue || studentGradeValue === 'Not specified') {
                showToast('Grade not specified. Contact teacher.', true);
                return [];
            }

            const sessionsRef = collection(db, 'sessions');
            const q = query(sessionsRef, where('grade', '==', studentGradeValue));
            const querySnap = await getDocs(q);

            const sessions = [];
            for (const docSnap of querySnap.docs) {
                const sessionData = {
                    id: docSnap.id,
                    ...docSnap.data()
                };
                const studentProgressRef = doc(db, 'sessions', docSnap.id, 'students', state.currentStudent.docId);
                const progressSnap = await getDoc(studentProgressRef);
                const studentProgress = progressSnap.exists() ? progressSnap.data() : null;

                const questionsRef = collection(db, 'sessions', docSnap.id, 'questions');
                const questionsSnap = await getDocs(questionsRef);
                let totalPoints = 0;
                questionsSnap.forEach(qDoc => totalPoints += qDoc.data().points || 0);

                sessions.push({
                    ...sessionData,
                    studentProgress,
                    questionCount: questionsSnap.size,
                    totalPoints
                });
            }
            return sessions;
        }

        async function renderSidebar() {
            const state = window.appState;
            const sb = document.getElementById('sidebarContent');

            let displayGrade = 'N/A';
            if (state.studentProfile?.gradeLevel) displayGrade = await getGradeName(state.studentProfile.gradeLevel);
            else if (state.studentProfile?.grade) displayGrade = state.studentProfile.grade;

            const sessions = await loadStudentSessions();
            state.availableSessions = sessions;

            let listHtml = `<div class="quiz-list">`;
            if (sessions.length === 0) {
                listHtml += `<div style="text-align:center; color:var(--gray); padding:20px;">No active quizzes.</div>`;
            } else {
                sessions.forEach(session => {
                    const status = getQuizStatus(session, session.studentProgress);
                    const accessible = isQuizAccessible(session);
                    const submitted = session.studentProgress?.submitted;

                    listHtml += `
                    <div class="quiz-item ${!accessible || submitted ? 'disabled' : ''}" 
                         onclick="${accessible && !submitted ? `window.selectSession('${session.id}')` : ''}">
                        <span class="quiz-status ${status.class}"><i class="fas ${status.icon}"></i> ${status.text}</span>
                        <h4 style="margin-bottom:4px;">${escapeHtml(session.title)}</h4>
                        <small style="color:var(--gray)">${escapeHtml(session.subject || 'General')}</small>
                    </div>
                `;
                });
            }
            listHtml += `</div>`;

            sb.innerHTML = `
            <div class="profile-summary">
                <h2>${escapeHtml(state.studentProfile?.name || 'Student')}</h2>
                <div class="grade-badge"><i class="fas fa-star"></i> Grade: ${escapeHtml(displayGrade)}</div>
            </div>
            <h3 style="font-size:1.1rem; color:var(--dark); margin-bottom:16px;">Your Quizzes</h3>
            ${listHtml}
        `;
        }

        window.selectSession = async function(sessionId) {
            const state = window.appState;
            const session = state.availableSessions.find(s => s.id === sessionId);

            if (!session || !isQuizAccessible(session) || session.studentProgress?.submitted) {
                showToast('Cannot start this quiz.', true);
                return;
            }

            state.currentSession = session;

            // Load Questions
            const questionsRef = collection(db, 'sessions', sessionId, 'questions');
            const questionsSnap = await getDocs(questionsRef);
            state.questions = [];
            questionsSnap.forEach(doc => state.questions.push({
                id: doc.id,
                ...doc.data()
            }));
            state.questions.sort((a, b) => (a.order || 0) - (b.order || 0));

            if (state.questions.length === 0) {
                showToast('Quiz has no questions.', true);
                return;
            }

            // Find first unanswered
            const answers = session.studentProgress?.answers || {};
            let startIndex = 0;
            for (let i = 0; i < state.questions.length; i++) {
                if (!answers[state.questions[i].id]) {
                    startIndex = i;
                    break;
                }
            }
            state.currentQIndex = startIndex;

            // Switch Views
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('navFooter').classList.remove('hidden');

            await renderQuestion();
        };

        function getCurrentAnswer() {
            const state = window.appState;
            if (!state.questions.length) return null;
            const q = state.questions[state.currentQIndex];

            if (q.type === 'mcq') {
                const selected = document.querySelector('.option-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            if (q.type === 'truefalse') {
                const selected = document.querySelector('.tf-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            const inputEl = document.getElementById('answerInput');
            return inputEl && inputEl.value.trim() ? inputEl.value.trim() : null;
        }

        window.saveCurrentAnswer = async function() {
            const state = window.appState;
            if (state.isSaving) return;

            const answer = getCurrentAnswer();
            if (!answer) {
                showToast('Please select or write an answer.', true);
                return;
            }

            const q = state.questions[state.currentQIndex];
            const saveBtn = document.getElementById('btnSave');

            state.isSaving = true;
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            saveBtn.disabled = true;

            try {
                const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
                await updateDoc(studentRef, {
                    [`answers.${q.id}`]: answer
                });

                showToast('Answer Saved Successfully');
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved';

                if (!state.currentSession.studentProgress) state.currentSession.studentProgress = {
                    answers: {}
                };
                state.currentSession.studentProgress.answers[q.id] = answer;

                setTimeout(() => {
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                }, 1500);
            } catch (err) {
                console.error(err);
                showToast('Failed to save.', true);
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            } finally {
                state.isSaving = false;
            }
        };

        window.prevQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex > 0) {
                state.currentQIndex--;
                await renderQuestion();
            }
        };

        window.nextQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex < state.questions.length - 1) {
                state.currentQIndex++;
                await renderQuestion();
            }
        };

        window.finishQuiz = async function() {
            const state = window.appState;
            const currentAnswer = getCurrentAnswer();
            if (currentAnswer) {
                const q = state.questions[state.currentQIndex];
                const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
                await updateDoc(studentRef, {
                    [`answers.${q.id}`]: currentAnswer
                });
            }

            const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
            const snap = await getDoc(studentRef);
            const answersMap = snap.exists() ? snap.data().answers || {} : {};

            const missing = [];
            state.questions.forEach((q, i) => {
                if (!answersMap[q.id]) missing.push(i + 1);
            });

            if (missing.length > 0) {
                showToast(`Unanswered questions: ${missing.join(', ')}`, true);
                return;
            }

            await updateDoc(studentRef, {
                submitted: true,
                submittedAt: Date.now()
            });
            showToast('Quiz Submitted Successfully!');

            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('navFooter').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            await renderSidebar();
        };

        async function renderQuestion() {
            const state = window.appState;
            if (!state.questions.length) return;

            const q = state.questions[state.currentQIndex];
            const existingAnswer = state.currentSession.studentProgress?.answers?.[q.id];
            const total = state.questions.length;

            let inputHtml = '';
            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

            if (q.type === 'mcq' && q.options?.length) {
                inputHtml = `<div class="options-grid">` +
                    q.options.map((opt, idx) => `
                    <button class="option-btn ${existingAnswer === opt ? 'selected' : ''}" 
                            data-value="${escapeHtml(opt)}"
                            onclick="document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <span style="font-weight:800; opacity:0.5;">${letters[idx]}</span> 
                        <span>${escapeHtml(opt)}</span>
                    </button>
                `).join('') + `</div>`;
            } else if (q.type === 'truefalse') {
                inputHtml = `
                <div class="tf-container">
                    <button class="btn btn-secondary tf-btn ${existingAnswer === 'True' ? 'selected' : ''}" data-value="True" onclick="document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">True</button>
                    <button class="btn btn-secondary tf-btn ${existingAnswer === 'False' ? 'selected' : ''}" data-value="False" onclick="document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">False</button>
                </div>
            `;
            } else if (q.type === 'number') {
                inputHtml = `<input class="text-input" id="answerInput" type="number" placeholder="Enter numeric answer..." value="${existingAnswer || ''}">`;
            } else {
                inputHtml = `<textarea class="text-input" id="answerInput" placeholder="Type your detailed answer here...">${existingAnswer || ''}</textarea>`;
            }

            const quizScreen = document.getElementById('quizScreen');
            quizScreen.innerHTML = `
            <div class="quiz-wrapper">
                <div class="quiz-header-card">
                    <div>
                        <h3 style="color:var(--gray); font-size:0.9rem; text-transform:uppercase; letter-spacing:1px;">${escapeHtml(state.currentSession.title)}</h3>
                        <div style="font-size:0.9rem; color:var(--gray); margin-top:4px;">
                            Question ${state.currentQIndex + 1} of ${total}
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <span class="badge badge-pts"><i class="fas fa-star"></i> ${q.points} pts</span>
                    </div>
                </div>

                <div class="question-card">
                    <div class="q-meta">
                        <span class="badge badge-num">Question ${state.currentQIndex + 1}</span>
                        ${existingAnswer ? '<span class="badge" style="background:#d1fae5; color:#065f46;"><i class="fas fa-check"></i> Saved</span>' : ''}
                    </div>
                    
                    <div class="q-text">${escapeHtml(q.text)}</div>
                    
                    <div style="margin-top:32px;">
                        ${inputHtml}
                    </div>
                </div>
            </div>
        `;

            // Update Nav Buttons
            document.getElementById('btnPrev').disabled = (state.currentQIndex === 0);

            const nextBtn = document.getElementById('btnNext');
            const finishBtn = document.getElementById('btnFinish');

            if (state.currentQIndex === total - 1) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }

            // Re-render Math
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([quizScreen]).catch(e => console.warn(e));
            }
        }

        // --- Auth Handlers ---
        window.doStudentLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errDiv = document.getElementById('loginErr');
            const btn = event?.target;

            if (!email || !pass) {
                errDiv.textContent = 'Enter email and password';
                errDiv.style.display = 'block';
                return;
            }

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errDiv.textContent = 'Invalid credentials';
                errDiv.style.display = 'block';
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                }
            }
        };

        window.exitSession = async function() {
            await signOut(auth);
            location.reload();
        };

        // --- Init ---
        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loadingScreen').style.display = 'none';

            if (!user) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                return;
            }

            document.getElementById('loadingScreen').style.display = 'flex';

            try {
                const studentsRef = collection(db, 'students');
                const q = query(studentsRef, where('uid', '==', user.uid));
                const querySnap = await getDocs(q);

                let studentData = null,
                    studentDocId = null;

                if (!querySnap.empty) {
                    studentDocId = querySnap.docs[0].id;
                    studentData = querySnap.docs[0].data();
                } else {
                    const directSnap = await getDoc(doc(db, 'students', user.uid));
                    if (directSnap.exists()) {
                        studentDocId = user.uid;
                        studentData = directSnap.data();
                    }
                }

                if (!studentData) throw new Error('Profile not found');

                window.appState.currentStudent = user;
                window.appState.studentProfile = studentData;
                window.appState.currentStudent.docId = studentDocId;

                document.getElementById('studentName').textContent = studentData.name || user.email;
                document.getElementById('studentAvatar').textContent = (studentData.name || 'S').charAt(0).toUpperCase();

                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';

                await renderSidebar();

            } catch (err) {
                console.error(err);
                await signOut(auth);
                alert('Error loading profile: ' + err.message);
            }
        });
    </script>
</body>

</html>
