<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduBoard — Student Portal</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- MathJax Configuration -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['\\(', '\\)'],
                    ['$', '$']
                ]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        :root {
            /* Color Palette */
            --primary: #4f46e5;
            /* Indigo 600 */
            --primary-hover: #4338ca;
            /* Indigo 700 */
            --secondary: #10b981;
            /* Emerald 500 */
            --danger: #ef4444;
            /* Red 500 */
            --warning: #f59e0b;
            /* Amber 500 */

            --bg-body: #f3f4f6;
            /* Gray 100 */
            --bg-card: #ffffff;
            --text-main: #1f2937;
            /* Gray 800 */
            --text-muted: #6b7280;
            /* Gray 500 */
            --border: #e5e7eb;
            /* Gray 200 */

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --radius-xl: 1.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            /* App-like feel */
        }

        /* --- Utilities --- */
        .hidden {
            display: none !important;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .w-full {
            width: 100%;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: white;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        .btn-danger {
            background: #fee2e2;
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .btn-success {
            background: var(--secondary);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-lg {
            padding: 14px 28px;
            font-size: 1.1rem;
        }

        /* --- Login Screen --- */
        #loginScreen {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            ring: 2px solid var(--primary);
        }

        /* --- Main App Layout --- */
        #app {
            display: none;
            /* Hidden until auth */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Header */
        .top-header {
            height: 70px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            flex-shrink: 0;
            z-index: 20;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Workspace (Sidebar + Content) */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            /* Contains scroll areas */
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: #f9fafb;
        }

        .student-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .grade-badge {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .session-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .session-item {
            background: white;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .session-item:hover:not(.disabled) {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        .session-item.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #f9fafb;
        }

        .session-item.active {
            border-left: 4px solid var(--primary);
            background: #f5f7ff;
        }

        .status-pill {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        .status-open {
            color: var(--secondary);
        }

        .status-closed {
            color: var(--danger);
        }

        .status-done {
            color: var(--primary);
        }

        /* Main Content Area */
        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-body);
            position: relative;
        }

        /* --- Dashboard View --- */
        .welcome-banner {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 40px;
            border-radius: var(--radius-xl);
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg);
        }

        .welcome-banner h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .welcome-banner p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        /* --- Quiz Interface --- */
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .question-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            margin-bottom: 30px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .q-meta {
            display: flex;
            gap: 10px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-num {
            background: #eff6ff;
            color: var(--primary);
        }

        .badge-pts {
            background: #fffbeb;
            color: #b45309;
        }

        .q-text {
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 32px;
            font-weight: 500;
        }

        /* MathJax Enhancement */
        mjx-container {
            font-size: 115% !important;
            color: #111;
        }

        /* Answer Options Styling */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .option-btn {
            background: white;
            border: 2px solid var(--border);
            padding: 20px;
            border-radius: var(--radius-md);
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option-btn:hover {
            border-color: #a5b4fc;
            background: #fdfdfd;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary);
            font-weight: 600;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .option-letter {
            background: #f3f4f6;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .option-btn.selected .option-letter {
            background: var(--primary);
            color: white;
        }

        .input-answer {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            transition: 0.2s;
        }

        .input-answer:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea.input-answer {
            min-height: 150px;
            resize: vertical;
        }

        /* Sticky Footer Nav */
        .nav-footer {
            position: fixed;
            bottom: 0;
            left: 320px;
            right: 0;
            /* Left matches sidebar width */
            height: 80px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 40;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            right: 40px;
            background: #1f2937;
            color: white;
            padding: 16px 24px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .workspace {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .nav-footer {
                left: 0;
                padding: 0 20px;
            }

            .content-area {
                padding: 20px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Loading Spinner -->
    <div id="loadingScreen" class="flex-center" style="position:fixed; inset:0; background:white; z-index:9999;">
        <div style="text-align:center">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary);"></i>
            <p style="margin-top:16px; color:var(--text-muted); font-weight:500;">Loading EduBoard...</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div style="font-size: 3rem; margin-bottom: 16px; color: var(--primary);"><i class="fas fa-graduation-cap"></i></div>
            <h2 style="margin-bottom: 8px; font-size: 1.8rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); margin-bottom: 32px;">Sign in to access your quizzes</p>

            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Student Email Address">
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" placeholder="Password">
            </div>

            <button class="btn btn-primary w-full btn-lg" onclick="window.doStudentLogin()">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
            <div id="loginErr" style="color:var(--danger); margin-top:16px; display:none; font-weight:500;"></div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app">
        <!-- Top Header -->
        <header class="top-header">
            <div class="brand">
                <i class="fas fa-graduation-cap"></i> EduBoard
            </div>
            <div class="user-profile">
                <div style="text-align: right; display: none;" id="userInfoText">
                    <div style="font-weight: 600;" id="studentName">Student Name</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">Student</div>
                </div>
                <div class="avatar" id="studentAvatar">S</div>
                <button class="btn btn-danger" onclick="window.exitSession()" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div class="workspace">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="student-info">
                        <h3 id="sidebarStudentName">Loading...</h3>
                        <span class="grade-badge" id="sidebarGrade">Grade: --</span>
                    </div>
                </div>
                <div style="padding: 20px 20px 0 20px; font-weight: 600; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase;">Available Quizzes</div>
                <div class="session-list" id="sidebarContent">
                    <!-- Dynamic Session List -->
                </div>
            </aside>

            <!-- Main Content -->
            <main class="content-area">
                <div id="welcomeScreen"></div>
                <div id="quizScreen" class="hidden"></div>
                <div id="completionScreen" class="hidden"></div>
            </main>
        </div>

        <!-- Sticky Footer Navigation (Quiz Mode Only) -->
        <footer class="nav-footer hidden" id="navFooter">
            <button class="btn btn-secondary" id="btnPrev" onclick="window.prevQuestion()">
                <i class="fas fa-chevron-left"></i> Previous
            </button>

            <div style="display:flex; gap:12px;">
                <button class="btn btn-primary" id="btnSave" onclick="window.saveCurrentAnswer()" style="background: var(--text-main);">
                    <i class="fas fa-save"></i> Save Answer
                </button>
                <button class="btn btn-primary" id="btnNext" onclick="window.nextQuestion()">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
                <button class="btn btn-success hidden" id="btnFinish" onclick="window.finishQuiz()">
                    <i class="fas fa-check-circle"></i> Submit Quiz
                </button>
            </div>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: #34d399; font-size:1.2rem;"></i>
        <span id="toastMessage" style="font-weight: 500;">Action Successful</span>
    </div>

    <script type="module">
        import {
            auth,
            db,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            signOut,
            getDoc,
            setDoc,
            doc,
            collection,
            query,
            where,
            getDocs,
            updateDoc
        } from './firebase-config.js';

        window.appState = {
            currentStudent: null,
            studentProfile: null,
            studentGradeName: null,
            availableSessions: [],
            currentSession: null,
            questions: [],
            currentQIndex: 0,
            isSaving: false
        };

        // --- UI Helpers ---
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toastMsg.textContent = msg;
            if (isError) {
                icon.className = 'fas fa-exclamation-circle';
                icon.style.color = '#f87171';
            } else {
                icon.className = 'fas fa-check-circle';
                icon.style.color = '#34d399';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // --- Logic Functions ---

        async function getGradeName(gradeLevelId) {
            if (!gradeLevelId || gradeLevelId === 'Not specified') return 'Not specified';
            try {
                const gradeDoc = await getDoc(doc(db, 'grades', gradeLevelId));
                if (gradeDoc.exists()) {
                    const gradeData = gradeDoc.data();
                    return gradeData.nameEn || gradeData.nameAr || gradeLevelId;
                }
            } catch (e) {
                console.warn(e);
            }
            return gradeLevelId;
        }

        function isQuizAccessible(session) {
            const now = new Date();
            if (session.startTime && session.endTime) {
                let startTime, endTime;
                if (session.startTime.toDate) startTime = session.startTime.toDate();
                else if (session.startTime.seconds) startTime = new Date(session.startTime.seconds * 1000);
                else startTime = new Date(session.startTime);

                if (session.endTime.toDate) endTime = session.endTime.toDate();
                else if (session.endTime.seconds) endTime = new Date(session.endTime.seconds * 1000);
                else endTime = new Date(session.endTime);

                return now >= startTime && now <= endTime;
            }
            return session.isActive === true;
        }

        function getQuizStatus(session, studentData) {
            if (studentData?.submitted) return {
                text: 'Completed',
                class: 'status-done',
                icon: 'fa-check'
            };
            if (!isQuizAccessible(session)) return {
                text: 'Closed',
                class: 'status-closed',
                icon: 'fa-lock'
            };
            if (studentData?.answers && Object.keys(studentData.answers).length > 0) return {
                text: 'In Progress',
                class: 'status-open',
                icon: 'fa-pen'
            };
            return {
                text: 'Available',
                class: 'status-open',
                icon: 'fa-play'
            };
        }

        async function loadStudentSessions() {
            const state = window.appState;
            let studentGradeValue = null;

            if (state.studentProfile?.gradeLevel) {
                studentGradeValue = await getGradeName(state.studentProfile.gradeLevel);
            } else if (state.studentProfile?.grade) {
                studentGradeValue = state.studentProfile.grade;
            }

            if (!studentGradeValue || studentGradeValue === 'Not specified') {
                showToast('Grade not specified. Contact teacher.', true);
                return [];
            }

            const sessionsRef = collection(db, 'sessions');
            const q = query(sessionsRef, where('grade', '==', studentGradeValue));
            const querySnap = await getDocs(q);

            const sessions = [];
            for (const docSnap of querySnap.docs) {
                const sessionData = {
                    id: docSnap.id,
                    ...docSnap.data()
                };
                const studentProgressRef = doc(db, 'sessions', docSnap.id, 'students', state.currentStudent.docId);
                const progressSnap = await getDoc(studentProgressRef);
                const studentProgress = progressSnap.exists() ? progressSnap.data() : null;

                const questionsRef = collection(db, 'sessions', docSnap.id, 'questions');
                const questionsSnap = await getDocs(questionsRef);
                let totalPoints = 0;
                questionsSnap.forEach(qDoc => totalPoints += qDoc.data().points || 0);

                sessions.push({
                    ...sessionData,
                    studentProgress,
                    questionCount: questionsSnap.size,
                    totalPoints
                });
            }
            return sessions;
        }

        async function renderSidebar() {
            const state = window.appState;
            const sb = document.getElementById('sidebarContent');

            // Update Header Info
            document.getElementById('sidebarStudentName').textContent = state.studentProfile?.name || 'Student';
            let displayGrade = 'N/A';
            if (state.studentProfile?.gradeLevel) displayGrade = await getGradeName(state.studentProfile.gradeLevel);
            else if (state.studentProfile?.grade) displayGrade = state.studentProfile.grade;
            document.getElementById('sidebarGrade').textContent = `Grade: ${displayGrade}`;

            const sessions = await loadStudentSessions();
            state.availableSessions = sessions;

            let listHtml = ``;
            if (sessions.length === 0) {
                listHtml += `<div style="text-align:center; color:var(--text-muted); padding:20px; font-style:italic;">No active quizzes found.</div>`;
            } else {
                sessions.forEach(session => {
                    const status = getQuizStatus(session, session.studentProgress);
                    const accessible = isQuizAccessible(session);
                    const submitted = session.studentProgress?.submitted;

                    listHtml += `
                    <div class="session-item ${!accessible || submitted ? 'disabled' : ''}" 
                         onclick="${accessible && !submitted ? `window.selectSession('${session.id}')` : ''}">
                        <span class="status-pill ${status.class}"><i class="fas ${status.icon}"></i> ${status.text}</span>
                        <h4 style="margin-bottom:4px; font-weight:600;">${escapeHtml(session.title)}</h4>
                        <small style="color:var(--text-muted)">${escapeHtml(session.subject || 'General Subject')}</small>
                    </div>
                `;
                });
            }

            sb.innerHTML = listHtml;
        }

        window.selectSession = async function(sessionId) {
            const state = window.appState;
            const session = state.availableSessions.find(s => s.id === sessionId);

            if (!session || !isQuizAccessible(session) || session.studentProgress?.submitted) {
                showToast('Cannot start this quiz.', true);
                return;
            }

            state.currentSession = session;

            // Load Questions
            const questionsRef = collection(db, 'sessions', sessionId, 'questions');
            const questionsSnap = await getDocs(questionsRef);
            state.questions = [];
            questionsSnap.forEach(doc => state.questions.push({
                id: doc.id,
                ...doc.data()
            }));
            state.questions.sort((a, b) => (a.order || 0) - (b.order || 0));

            if (state.questions.length === 0) {
                showToast('Quiz has no questions.', true);
                return;
            }

            // Find first unanswered
            const answers = session.studentProgress?.answers || {};
            let startIndex = 0;
            for (let i = 0; i < state.questions.length; i++) {
                if (!answers[state.questions[i].id]) {
                    startIndex = i;
                    break;
                }
            }
            state.currentQIndex = startIndex;

            // Switch Views
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('navFooter').classList.remove('hidden');

            await renderQuestion();
        };

        function getCurrentAnswer() {
            const state = window.appState;
            if (!state.questions.length) return null;
            const q = state.questions[state.currentQIndex];

            if (q.type === 'mcq') {
                const selected = document.querySelector('.option-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            if (q.type === 'truefalse') {
                const selected = document.querySelector('.tf-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            const inputEl = document.getElementById('answerInput');
            return inputEl && inputEl.value.trim() ? inputEl.value.trim() : null;
        }

        window.saveCurrentAnswer = async function() {
            const state = window.appState;
            if (state.isSaving) return;

            const answer = getCurrentAnswer();
            if (!answer) {
                showToast('Please select or write an answer.', true);
                return;
            }

            const q = state.questions[state.currentQIndex];
            const saveBtn = document.getElementById('btnSave');

            state.isSaving = true;
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            saveBtn.disabled = true;

            try {
                const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
                await updateDoc(studentRef, {
                    [`answers.${q.id}`]: answer
                });

                showToast('Answer Saved Successfully');
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved';

                if (!state.currentSession.studentProgress) state.currentSession.studentProgress = {
                    answers: {}
                };
                state.currentSession.studentProgress.answers[q.id] = answer;

                setTimeout(() => {
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                }, 1500);
            } catch (err) {
                console.error(err);
                showToast('Failed to save.', true);
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            } finally {
                state.isSaving = false;
            }
        };

        window.prevQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex > 0) {
                state.currentQIndex--;
                await renderQuestion();
            }
        };

        window.nextQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex < state.questions.length - 1) {
                state.currentQIndex++;
                await renderQuestion();
            }
        };

        window.finishQuiz = async function() {
            const state = window.appState;
            const currentAnswer = getCurrentAnswer();
            if (currentAnswer) {
                const q = state.questions[state.currentQIndex];
                const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
                await updateDoc(studentRef, {
                    [`answers.${q.id}`]: currentAnswer
                });
            }

            const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
            const snap = await getDoc(studentRef);
            const answersMap = snap.exists() ? snap.data().answers || {} : {};

            const missing = [];
            state.questions.forEach((q, i) => {
                if (!answersMap[q.id]) missing.push(i + 1);
            });

            if (missing.length > 0) {
                showToast(`Unanswered questions: ${missing.join(', ')}`, true);
                return;
            }

            await updateDoc(studentRef, {
                submitted: true,
                submittedAt: Date.now()
            });
            showToast('Quiz Submitted Successfully!');

            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('navFooter').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            await renderSidebar();
        };

        async function renderQuestion() {
            const state = window.appState;
            if (!state.questions.length) return;

            const q = state.questions[state.currentQIndex];
            const existingAnswer = state.currentSession.studentProgress?.answers?.[q.id];
            const total = state.questions.length;

            let inputHtml = '';
            const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

            if (q.type === 'mcq' && q.options?.length) {
                inputHtml = `<div class="options-grid">` +
                    q.options.map((opt, idx) => `
                    <button class="option-btn ${existingAnswer === opt ? 'selected' : ''}" 
                            data-value="${escapeHtml(opt)}"
                            onclick="document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <span class="option-letter">${letters[idx]}</span> 
                        <span>${escapeHtml(opt)}</span>
                    </button>
                `).join('') + `</div>`;
            } else if (q.type === 'truefalse') {
                inputHtml = `
                <div class="options-grid" style="grid-template-columns: 1fr 1fr;">
                    <button class="option-btn tf-btn ${existingAnswer === 'True' ? 'selected' : ''}" data-value="True" onclick="document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <i class="fas fa-check" style="color:green"></i> True
                    </button>
                    <button class="option-btn tf-btn ${existingAnswer === 'False' ? 'selected' : ''}" data-value="False" onclick="document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <i class="fas fa-times" style="color:red"></i> False
                    </button>
                </div>
            `;
            } else if (q.type === 'number') {
                inputHtml = `<input class="input-answer" id="answerInput" type="number" placeholder="Enter numeric answer..." value="${existingAnswer || ''}">`;
            } else {
                inputHtml = `<textarea class="input-answer" id="answerInput" placeholder="Type your detailed answer here...">${existingAnswer || ''}</textarea>`;
            }

            const quizScreen = document.getElementById('quizScreen');
            quizScreen.innerHTML = `
            <div class="quiz-container">
                <div class="question-card">
                    <div class="q-header">
                        <div class="q-meta">
                            <span class="badge badge-num">Question ${state.currentQIndex + 1} / ${total}</span>
                            ${existingAnswer ? '<span class="badge" style="background:#d1fae5; color:#065f46;"><i class="fas fa-check"></i> Saved</span>' : ''}
                        </div>
                        <span class="badge badge-pts"><i class="fas fa-star"></i> ${q.points} pts</span>
                    </div>
                    
                    <div class="q-text">${escapeHtml(q.text)}</div>
                    
                    <div style="margin-top:32px;">
                        ${inputHtml}
                    </div>
                </div>
            </div>
        `;

            // Update Nav Buttons
            document.getElementById('btnPrev').disabled = (state.currentQIndex === 0);

            const nextBtn = document.getElementById('btnNext');
            const finishBtn = document.getElementById('btnFinish');

            if (state.currentQIndex === total - 1) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }

            // Re-render Math
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([quizScreen]).catch(e => console.warn(e));
            }
        }

        // --- Auth Handlers ---
        window.doStudentLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errDiv = document.getElementById('loginErr');
            const btn = event?.target;

            if (!email || !pass) {
                errDiv.textContent = 'Enter email and password';
                errDiv.style.display = 'block';
                return;
            }

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errDiv.textContent = 'Invalid credentials';
                errDiv.style.display = 'block';
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                }
            }
        };

        window.exitSession = async function() {
            await signOut(auth);
            location.reload();
        };

        // --- Init ---
        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loadingScreen').style.display = 'none';

            if (!user) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                return;
            }

            document.getElementById('loadingScreen').style.display = 'flex';

            try {
                const studentsRef = collection(db, 'students');
                const q = query(studentsRef, where('uid', '==', user.uid));
                const querySnap = await getDocs(q);

                let studentData = null,
                    studentDocId = null;

                if (!querySnap.empty) {
                    studentDocId = querySnap.docs[0].id;
                    studentData = querySnap.docs[0].data();
                } else {
                    const directSnap = await getDoc(doc(db, 'students', user.uid));
                    if (directSnap.exists()) {
                        studentDocId = user.uid;
                        studentData = directSnap.data();
                    }
                }

                if (!studentData) throw new Error('Profile not found');

                window.appState.currentStudent = user;
                window.appState.studentProfile = studentData;
                window.appState.currentStudent.docId = studentDocId;

                // Update Header
                document.getElementById('studentName').textContent = studentData.name || user.email;
                document.getElementById('sidebarStudentName').textContent = studentData.name || user.email;
                document.getElementById('studentAvatar').textContent = (studentData.name || 'S').charAt(0).toUpperCase();
                document.getElementById('userInfoText').style.display = 'block';

                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';

                await renderSidebar();

            } catch (err) {
                console.error(err);
                await signOut(auth);
                alert('Error loading profile: ' + err.message);
            }
        });
    </script>
</body>

</html>
