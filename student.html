<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduBoard — Interactive Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['\\(', '\\)'],
                    ['$', '$']
                ]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #1e293b;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --border: #e2e8f0;
            --success: #10b981;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .btn {
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner-screen {
            position: fixed;
            inset: 0;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            color: var(--dark);
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 6000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateX(0);
        }

        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--gradient-1);
        }

        .login-card {
            background: white;
            border-radius: 40px;
            padding: 50px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #app {
            display: none;
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .student-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light-gray);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .dashboard-grid {
            display: grid;
            gap: 24px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            backdrop-filter: blur(10px);
        }

        .profile-info h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .grade-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .quiz-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid var(--border);
        }

        .quiz-card:hover:not(.disabled) {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            border-color: var(--primary);
        }

        .quiz-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .quiz-card.disabled:hover {
            transform: none;
        }

        .quiz-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-open {
            background: #d1fae5;
            color: #065f46;
        }

        .status-closed {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-inprogress {
            background: #fed7aa;
            color: #9a3412;
        }

        .status-completed {
            background: #e0e7ff;
            color: #3730a3;
        }

        .quiz-progress {
            margin: 16px 0;
            background: var(--light-gray);
            border-radius: 10px;
            overflow: hidden;
        }

        .quiz-progress-bar {
            height: 6px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
            font-size: 0.9rem;
        }

        .debug-info {
            background: #fef3c7;
            border-left: 4px solid var(--warning);
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-family: monospace;
            display: none;
        }
    </style>
</head>

<body>

    <div class="spinner-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div style="color: white; font-size: 1.2rem;">Loading EduBoard...</div>
    </div>

    <div id="loginScreen">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="font-size: 3rem;">🎓</div>
                <h2 style="margin-top: 16px;">Welcome Back!</h2>
                <p style="color: var(--gray);">Sign in to continue your learning journey</p>
            </div>
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="student@school.com">
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="window.doStudentLogin()">
                Sign In →
            </button>
            <div class="error-msg" id="loginErr"></div>
        </div>
    </div>

    <div id="app">
        <header class="header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i> EduBoard
            </div>
            <div class="header-right">
                <div class="student-badge" id="studentBadge">
                    <div class="student-avatar" id="studentAvatar">👤</div>
                    <span id="studentName">Student</span>
                </div>
                <button class="logout-btn" onclick="window.exitSession()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <main class="main">
            <div id="welcomeScreen"></div>
            <div id="quizScreen"></div>
            <div id="completionScreen"></div>
        </main>

        <footer class="nav-footer" id="navFooter" style="display:none;">
            <button class="btn btn-secondary" id="btnPrev" onclick="window.prevQuestion()">
                <i class="fas fa-chevron-left"></i> Previous
            </button>
            <button class="btn btn-primary" id="btnSave" onclick="window.saveCurrentAnswer()">
                <i class="fas fa-save"></i> Save Answer
            </button>
            <button class="btn btn-secondary" id="btnNext" onclick="window.nextQuestion()">
                Next <i class="fas fa-chevron-right"></i>
            </button>
            <button class="btn btn-success" id="btnFinish" onclick="window.finishQuiz()" style="display:none;">
                <i class="fas fa-check-circle"></i> Submit Quiz
            </button>
        </footer>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: var(--success);"></i>
        <span id="toastMessage"></span>
    </div>

    <script type="module">
        import {
            auth,
            db,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            signOut,
            getDoc,
            setDoc,
            doc,
            collection,
            query,
            where,
            getDocs,
            updateDoc
        } from './firebase-config.js';

        window.appState = {
            currentStudent: null,
            studentProfile: null,
            studentGradeName: null,
            availableSessions: [],
            currentSession: null,
            questions: [],
            currentQIndex: 0,
            isSaving: false
        };

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = msg;
            toast.querySelector('i').className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toast.querySelector('i').style.color = isError ? 'var(--danger)' : 'var(--success)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Get grade name from gradeLevel ID reference
        async function getGradeName(gradeLevelId) {
            if (!gradeLevelId || gradeLevelId === 'Not specified') return 'Not specified';

            try {
                const gradeDoc = await getDoc(doc(db, 'grades', gradeLevelId));
                if (gradeDoc.exists()) {
                    const gradeData = gradeDoc.data();
                    // Return English name or Arabic name
                    return gradeData.nameEn || gradeData.nameAr || gradeLevelId;
                }
            } catch (e) {
                console.warn('Could not fetch grade name:', e);
            }
            return gradeLevelId;
        }

        // Check if quiz is accessible based on date/time
        function isQuizAccessible(session) {
            const now = new Date();

            // Check if session has startTime and endTime
            if (session.startTime && session.endTime) {
                let startTime, endTime;

                // Handle Firestore Timestamp
                if (session.startTime.toDate) {
                    startTime = session.startTime.toDate();
                } else if (session.startTime.seconds) {
                    startTime = new Date(session.startTime.seconds * 1000);
                } else {
                    startTime = new Date(session.startTime);
                }

                if (session.endTime.toDate) {
                    endTime = session.endTime.toDate();
                } else if (session.endTime.seconds) {
                    endTime = new Date(session.endTime.seconds * 1000);
                } else {
                    endTime = new Date(session.endTime);
                }

                return now >= startTime && now <= endTime;
            }

            // If no time restrictions, check if active
            return session.isActive === true;
        }

        // Get quiz status text and class
        function getQuizStatus(session, studentData) {
            if (studentData?.submitted) {
                return {
                    text: '✓ Completed',
                    class: 'status-completed'
                };
            }

            if (!isQuizAccessible(session)) {
                const now = new Date();
                let startTime, endTime;

                if (session.startTime) {
                    if (session.startTime.toDate) startTime = session.startTime.toDate();
                    else if (session.startTime.seconds) startTime = new Date(session.startTime.seconds * 1000);
                    else startTime = new Date(session.startTime);

                    if (now < startTime) {
                        return {
                            text: `🔒 Starts ${startTime.toLocaleTimeString()}`,
                            class: 'status-closed'
                        };
                    }
                }

                if (session.endTime) {
                    if (session.endTime.toDate) endTime = session.endTime.toDate();
                    else if (session.endTime.seconds) endTime = new Date(session.endTime.seconds * 1000);
                    else endTime = new Date(session.endTime);

                    if (now > endTime) {
                        return {
                            text: '⏰ Quiz Closed',
                            class: 'status-closed'
                        };
                    }
                }

                return {
                    text: '🔒 Not Available',
                    class: 'status-closed'
                };
            }

            if (studentData?.answers && Object.keys(studentData.answers).length > 0) {
                return {
                    text: '📝 In Progress',
                    class: 'status-inprogress'
                };
            }

            return {
                text: '🟢 Available',
                class: 'status-open'
            };
        }

        async function loadStudentSessions() {
            const state = window.appState;

            // Get student's grade name (from the grade document reference)
            let studentGradeValue = null;

            if (state.studentProfile?.gradeLevel) {
                // If gradeLevel is a document ID, fetch the actual grade name
                const gradeName = await getGradeName(state.studentProfile.gradeLevel);
                studentGradeValue = gradeName;
                console.log('Student grade from gradeLevel reference:', studentGradeValue);
            } else if (state.studentProfile?.grade) {
                studentGradeValue = state.studentProfile.grade;
                console.log('Student grade from direct field:', studentGradeValue);
            }

            if (!studentGradeValue || studentGradeValue === 'Not specified') {
                showToast('Grade not specified. Please contact your teacher.', true);
                return [];
            }

            // Query sessions that match the student's grade name
            const sessionsRef = collection(db, 'sessions');
            const q = query(sessionsRef, where('grade', '==', studentGradeValue));
            const querySnap = await getDocs(q);

            console.log(`Found ${querySnap.size} sessions for grade: ${studentGradeValue}`);

            const sessions = [];
            for (const docSnap of querySnap.docs) {
                const sessionData = {
                    id: docSnap.id,
                    ...docSnap.data()
                };

                // Get student progress for this session
                const studentProgressRef = doc(db, 'sessions', docSnap.id, 'students', state.currentStudent.docId);
                const progressSnap = await getDoc(studentProgressRef);
                const studentProgress = progressSnap.exists() ? progressSnap.data() : null;

                // Get question count
                const questionsRef = collection(db, 'sessions', docSnap.id, 'questions');
                const questionsSnap = await getDocs(questionsRef);
                const questionCount = questionsSnap.size;

                // Calculate total points
                let totalPoints = 0;
                questionsSnap.forEach(qDoc => {
                    totalPoints += qDoc.data().points || 0;
                });

                sessions.push({
                    ...sessionData,
                    studentProgress,
                    questionCount,
                    totalPoints
                });
            }

            // Sort: In progress first, then available, then completed
            sessions.sort((a, b) => {
                const aSubmitted = a.studentProgress?.submitted;
                const bSubmitted = b.studentProgress?.submitted;

                if (aSubmitted && !bSubmitted) return 1;
                if (!aSubmitted && bSubmitted) return -1;

                const aAccessible = isQuizAccessible(a);
                const bAccessible = isQuizAccessible(b);

                if (aAccessible && !bAccessible) return -1;
                if (!aAccessible && bAccessible) return 1;

                return 0;
            });

            return sessions;
        }

        async function showWelcomeDashboard() {
            const state = window.appState;
            const ws = document.getElementById('welcomeScreen');
            const quizScreen = document.getElementById('quizScreen');
            const completionScreen = document.getElementById('completionScreen');
            const navFooter = document.getElementById('navFooter');

            ws.style.display = 'block';
            quizScreen.style.display = 'none';
            completionScreen.style.display = 'none';
            navFooter.style.display = 'none';

            // Get student's display grade name
            let displayGrade = 'Not specified';
            if (state.studentProfile?.gradeLevel) {
                displayGrade = await getGradeName(state.studentProfile.gradeLevel);
            } else if (state.studentProfile?.grade) {
                displayGrade = state.studentProfile.grade;
            }

            // Load available sessions
            const sessions = await loadStudentSessions();
            state.availableSessions = sessions;

            const studentName = state.studentProfile?.name || 'Student';
            const studentEmail = state.currentStudent?.email || '';

            let sessionsHtml = '';
            if (sessions.length === 0) {
                sessionsHtml = `
                <div class="glass-card" style="text-align: center; padding: 40px;">
                    <i class="fas fa-folder-open" style="font-size: 3rem; color: var(--gray);"></i>
                    <h3 style="margin-top: 16px;">No Quizzes Available</h3>
                    <p>There are no quizzes for your grade (${escapeHtml(displayGrade)}) at the moment.</p>
                    <p style="margin-top: 8px; font-size: 0.85rem;">Please check with your teacher to create quizzes for your grade.</p>
                </div>
            `;
            } else {
                sessionsHtml = `<div class="sessions-grid">`;
                for (const session of sessions) {
                    const answeredCount = session.studentProgress?.answers ? Object.keys(session.studentProgress.answers).length : 0;
                    const totalQuestions = session.questionCount || 0;
                    const progressPercent = totalQuestions > 0 ? (answeredCount / totalQuestions) * 100 : 0;
                    const status = getQuizStatus(session, session.studentProgress);
                    const isAccessible = isQuizAccessible(session);
                    const isSubmitted = session.studentProgress?.submitted;

                    // Format times for display
                    let startTimeStr = '',
                        endTimeStr = '';
                    if (session.startTime) {
                        if (session.startTime.toDate) startTimeStr = session.startTime.toDate().toLocaleString();
                        else if (session.startTime.seconds) startTimeStr = new Date(session.startTime.seconds * 1000).toLocaleString();
                        else startTimeStr = new Date(session.startTime).toLocaleString();
                    }
                    if (session.endTime) {
                        if (session.endTime.toDate) endTimeStr = session.endTime.toDate().toLocaleString();
                        else if (session.endTime.seconds) endTimeStr = new Date(session.endTime.seconds * 1000).toLocaleString();
                        else endTimeStr = new Date(session.endTime).toLocaleString();
                    }

                    sessionsHtml += `
                    <div class="quiz-card ${!isAccessible || isSubmitted ? 'disabled' : ''}" 
                         onclick="${isAccessible && !isSubmitted ? `window.selectSession('${session.id}')` : ''}">
                        <span class="quiz-status ${status.class}">${status.text}</span>
                        <h3 style="margin: 12px 0;">${escapeHtml(session.title || 'Untitled Quiz')}</h3>
                        <p style="color: var(--gray); font-size: 0.9rem;">${escapeHtml(session.subject || 'General')}</p>
                        <p style="color: var(--gray); font-size: 0.85rem; margin-top: 8px;">${escapeHtml(session.instructions || 'No description')}</p>
                        
                        ${totalQuestions > 0 ? `
                        <div class="quiz-progress">
                            <div class="quiz-progress-bar" style="width: ${progressPercent}%;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--gray);">
                            <span>📊 ${answeredCount}/${totalQuestions} answered</span>
                            <span>⭐ ${session.totalPoints || 0} pts</span>
                        </div>
                        ` : '<div style="margin: 16px 0;"><em>No questions added yet</em></div>'}
                        
                        ${startTimeStr && endTimeStr ? `
                        <div style="margin-top: 12px; font-size: 0.7rem; color: var(--gray);">
                            <i class="far fa-clock"></i> ${startTimeStr} - ${endTimeStr}
                        </div>
                        ` : ''}
                    </div>
                `;
                }
                sessionsHtml += `</div>`;
            }

            ws.innerHTML = `
            <div class="dashboard-grid">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="profile-info">
                        <h2>${escapeHtml(studentName)}</h2>
                        <p><i class="fas fa-envelope"></i> ${escapeHtml(studentEmail)}</p>
                        <div class="grade-tag">
                            <i class="fas fa-star"></i> Grade: ${escapeHtml(displayGrade)}
                        </div>
                    </div>
                </div>
                
                <div class="glass-card" style="padding: 32px;">
                    <h3><i class="fas fa-chalkboard"></i> Available Quizzes</h3>
                    <p style="color: var(--gray); margin-top: 8px;">Select a quiz to begin or continue</p>
                    ${sessionsHtml}
                </div>
            </div>
        `;
        }

        window.selectSession = async function(sessionId) {
            const state = window.appState;
            const session = state.availableSessions.find(s => s.id === sessionId);

            if (!session) {
                showToast('Session not found', true);
                return;
            }

            // Check accessibility again
            if (!isQuizAccessible(session)) {
                showToast('This quiz is not available at this time', true);
                return;
            }

            if (session.studentProgress?.submitted) {
                showToast('You have already completed this quiz', true);
                return;
            }

            state.currentSession = session;

            // Load questions for this session
            const questionsRef = collection(db, 'sessions', sessionId, 'questions');
            const questionsSnap = await getDocs(questionsRef);
            state.questions = [];
            questionsSnap.forEach(doc => {
                state.questions.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            state.questions.sort((a, b) => (a.order || 0) - (b.order || 0));

            if (state.questions.length === 0) {
                showToast('This quiz has no questions yet', true);
                return;
            }

            // Find first unanswered question
            const answers = session.studentProgress?.answers || {};
            let startIndex = 0;
            for (let i = 0; i < state.questions.length; i++) {
                if (!answers[state.questions[i].id]) {
                    startIndex = i;
                    break;
                }
            }
            state.currentQIndex = startIndex;

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('navFooter').style.display = 'flex';
            await renderQuestion();
        };

        function getCurrentAnswer() {
            const state = window.appState;
            if (!state.questions.length) return null;
            const q = state.questions[state.currentQIndex];

            if (q.type === 'mcq') {
                const selected = document.querySelector('.option-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            if (q.type === 'truefalse') {
                const selected = document.querySelector('.tf-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            const inputEl = document.getElementById('answerInput');
            return inputEl && inputEl.value.trim() ? inputEl.value.trim() : null;
        }

        window.saveCurrentAnswer = async function() {
            const state = window.appState;
            if (state.isSaving) return;

            const answer = getCurrentAnswer();
            if (!answer) {
                showToast('Please provide an answer first', true);
                return;
            }

            const q = state.questions[state.currentQIndex];
            const saveBtn = document.getElementById('btnSave');

            state.isSaving = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            saveBtn.disabled = true;

            try {
                const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
                await updateDoc(studentRef, {
                    [`answers.${q.id}`]: answer
                });

                showToast('Answer saved!', false);
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved';
                setTimeout(() => {
                    if (saveBtn) {
                        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Answer';
                        saveBtn.disabled = false;
                    }
                }, 1500);

                // Update local progress
                if (!state.currentSession.studentProgress) {
                    state.currentSession.studentProgress = {
                        answers: {}
                    };
                }
                state.currentSession.studentProgress.answers[q.id] = answer;

            } catch (err) {
                console.error('Save error:', err);
                showToast('Failed to save', true);
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Answer';
                saveBtn.disabled = false;
            } finally {
                state.isSaving = false;
            }
        };

        window.prevQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex > 0) {
                state.currentQIndex--;
                await renderQuestion();
            }
        };

        window.nextQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex < state.questions.length - 1) {
                state.currentQIndex++;
                await renderQuestion();
            }
        };

        window.finishQuiz = async function() {
            const state = window.appState;

            // Save current answer if any
            const currentAnswer = getCurrentAnswer();
            if (currentAnswer) {
                const q = state.questions[state.currentQIndex];
                const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
                await updateDoc(studentRef, {
                    [`answers.${q.id}`]: currentAnswer
                });
            }

            // Verify all questions answered
            const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
            const snap = await getDoc(studentRef);
            const answersMap = snap.exists() ? snap.data().answers || {} : {};

            const missingQuestions = [];
            for (let i = 0; i < state.questions.length; i++) {
                if (!answersMap[state.questions[i].id]) {
                    missingQuestions.push(i + 1);
                }
            }

            if (missingQuestions.length > 0) {
                showToast(`Please answer questions: ${missingQuestions.join(', ')}`, true);
                state.currentQIndex = missingQuestions[0] - 1;
                await renderQuestion();
                return;
            }

            await updateDoc(studentRef, {
                submitted: true,
                submittedAt: Date.now()
            });
            showToast('Quiz submitted successfully!');
            await showWelcomeDashboard();
        };

        async function renderQuestion() {
            const state = window.appState;
            if (!state.questions.length) return;

            const q = state.questions[state.currentQIndex];
            const existingAnswer = state.currentSession.studentProgress?.answers?.[q.id];
            const total = state.questions.length;
            const answeredCount = state.currentSession.studentProgress?.answers ? Object.keys(state.currentSession.studentProgress.answers).length : 0;

            let inputHtml = '';
            if (q.type === 'mcq' && q.options?.length) {
                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                inputHtml = `<div class="options-list">` +
                    q.options.map((opt, idx) => `
                    <button class="option-btn ${existingAnswer === opt ? 'selected' : ''}" 
                            data-value="${escapeHtml(opt)}"
                            onclick="event.preventDefault(); document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <span style="font-weight:700; margin-right:12px;">${letters[idx]}</span> ${escapeHtml(opt)}
                    </button>
                `).join('') + `</div>`;
            } else if (q.type === 'truefalse') {
                inputHtml = `
                <div style="display:flex; gap:12px;">
                    <button class="tf-btn ${existingAnswer === 'True' ? 'selected' : ''}" data-value="True" onclick="event.preventDefault(); document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">✅ True</button>
                    <button class="tf-btn ${existingAnswer === 'False' ? 'selected' : ''}" data-value="False" onclick="event.preventDefault(); document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">❌ False</button>
                </div>
            `;
            } else if (q.type === 'number') {
                inputHtml = `<input class="answer-number" id="answerInput" type="number" placeholder="Enter number..." value="${existingAnswer || ''}" style="width:100%; padding:14px; border-radius:16px; border:2px solid var(--border);">`;
            } else {
                inputHtml = `<textarea class="answer-textarea" id="answerInput" rows="4" placeholder="Write your answer..." style="width:100%; padding:14px; border-radius:16px; border:2px solid var(--border);">${existingAnswer || ''}</textarea>`;
            }

            const quizScreen = document.getElementById('quizScreen');
            quizScreen.innerHTML = `
            <div class="glass-card" style="padding: 24px; margin-bottom: 24px;">
                <div style="display:flex; justify-content:space-between; margin-bottom: 12px;">
                    <span><strong>${escapeHtml(state.currentSession.title)}</strong></span>
                    <span>${answeredCount}/${total} Answered</span>
                </div>
                <div style="background: var(--light-gray); border-radius: 10px; overflow: hidden;">
                    <div style="height: 8px; background: var(--gradient-1); width: ${(answeredCount/total)*100}%; transition: width 0.3s;"></div>
                </div>
            </div>
            <div class="glass-card" style="padding: 32px;">
                <div class="question-header">
                    <span class="quiz-status status-open">Question ${state.currentQIndex + 1} of ${total}</span>
                    <span style="background: var(--light-gray); padding: 6px 16px; border-radius: 50px;">⭐ ${q.points} pts</span>
                </div>
                <div class="q-text" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 24px;">${escapeHtml(q.text)}</div>
                ${existingAnswer ? `<div style="background: #d1fae5; padding: 8px 16px; border-radius: 12px; margin-bottom: 16px;"><i class="fas fa-check-circle"></i> Answer saved</div>` : ''}
                ${inputHtml}
            </div>
        `;

            const prevBtn = document.getElementById('btnPrev');
            const nextBtn = document.getElementById('btnNext');
            const finishBtn = document.getElementById('btnFinish');

            if (prevBtn) prevBtn.disabled = (state.currentQIndex === 0);
            if (nextBtn) nextBtn.style.display = (state.currentQIndex < total - 1) ? 'inline-flex' : 'none';
            if (finishBtn) finishBtn.style.display = (state.currentQIndex === total - 1) ? 'inline-flex' : 'none';

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([quizScreen]).catch(e => console.warn);
            }
        }

        window.doStudentLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errDiv = document.getElementById('loginErr');
            const btn = event?.target;

            if (!email || !pass) {
                errDiv.textContent = 'Please enter email and password';
                errDiv.style.display = 'block';
                return;
            }

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = 'Signing in...';
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errDiv.textContent = 'Invalid email or password';
                errDiv.style.display = 'block';
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In →';
                }
            }
        };

        window.exitSession = async function() {
            await signOut(auth);
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPass').value = '';
            const errDiv = document.getElementById('loginErr');
            errDiv.style.display = 'none';
            showToast('Logged out successfully');
        };

        document.getElementById('loginPass')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.doStudentLogin();
        });

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loadingScreen').style.display = 'none';

            if (!user) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                return;
            }

            document.getElementById('loadingScreen').style.display = 'flex';

            try {
                const studentsRef = collection(db, 'students');
                const q = query(studentsRef, where('uid', '==', user.uid));
                const querySnap = await getDocs(q);

                let studentData = null;
                let studentDocId = null;

                if (!querySnap.empty) {
                    studentDocId = querySnap.docs[0].id;
                    studentData = querySnap.docs[0].data();
                    console.log('Student data loaded:', studentData);
                } else {
                    const directSnap = await getDoc(doc(db, 'students', user.uid));
                    if (directSnap.exists()) {
                        studentDocId = user.uid;
                        studentData = directSnap.data();
                    }
                }

                if (!studentData) {
                    throw new Error('Student profile not found');
                }

                window.appState.currentStudent = user;
                window.appState.studentProfile = studentData;
                window.appState.currentStudent.docId = studentDocId;

                document.getElementById('studentName').textContent = studentData.name || user.email;
                document.getElementById('studentAvatar').innerHTML = (studentData.name || 'S').charAt(0).toUpperCase();

                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                await showWelcomeDashboard();

            } catch (err) {
                console.error('Error:', err);
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                const errDiv = document.getElementById('loginErr');
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
                await signOut(auth);
            }
        });
    </script>
</body>

</html>
