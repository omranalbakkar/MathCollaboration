<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduBoard — Interactive Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['\\(', '\\)'],
                    ['$', '$']
                ]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #1e293b;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --border: #e2e8f0;
            --success: #10b981;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #d9e4f5 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
        }

        /* ===== BUTTONS ===== */
        .btn {
            border: none;
            border-radius: 14px;
            padding: 13px 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.55);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.35);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.45);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== LOADING SPINNER ===== */
        .spinner-screen {
            position: fixed;
            inset: 0;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 9999;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            color: var(--dark);
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transform: translateX(420px);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 6000;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 260px;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--gradient-1);
        }

        .login-card {
            background: white;
            border-radius: 40px;
            padding: 52px 48px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease;
        }

        .login-card .login-icon {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card h2 {
            font-size: 1.9rem;
            font-weight: 800;
            text-align: center;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .login-card .login-sub {
            text-align: center;
            color: var(--gray);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            color: var(--dark);
            background: #fafbff;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }

        /* ===== APP LAYOUT ===== */
        #app {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.55rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .student-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--light-gray);
            padding: 8px 18px 8px 8px;
            border-radius: 50px;
        }

        .student-avatar {
            width: 38px;
            height: 38px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            padding: 9px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.35);
        }

        /* ===== MAIN CONTENT — FULL WIDTH ===== */
        .main {
            flex: 1;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 36px 40px;
        }

        /* ===== DASHBOARD ===== */
        .dashboard-grid {
            display: grid;
            gap: 28px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-card {
            background: var(--gradient-1);
            color: white;
            padding: 36px 40px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .profile-info h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .profile-info p {
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .grade-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.22);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ===== SESSIONS GRID ===== */
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 22px;
            margin-top: 24px;
        }

        .quiz-card {
            background: white;
            border-radius: 20px;
            padding: 26px;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            cursor: pointer;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .quiz-card:hover:not(.disabled) {
            transform: translateY(-5px);
            box-shadow: 0 16px 40px rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
        }

        .quiz-card:hover:not(.disabled)::before {
            opacity: 1;
        }

        .quiz-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .quiz-card.disabled:hover {
            transform: none;
        }

        /* ===== STATUS BADGES ===== */
        .quiz-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 0.02em;
        }

        .status-open {
            background: #d1fae5;
            color: #065f46;
        }

        .status-closed {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-inprogress {
            background: #fef3c7;
            color: #92400e;
        }

        .status-completed {
            background: #e0e7ff;
            color: #3730a3;
        }

        /* ===== QUIZ PROGRESS BAR ===== */
        .quiz-progress {
            margin: 14px 0 8px;
            background: var(--light-gray);
            border-radius: 10px;
            overflow: hidden;
            height: 7px;
        }

        .quiz-progress-bar {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* ===== ERROR MSG ===== */
        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ===== QUIZ SCREEN LAYOUT ===== */
        .quiz-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 28px;
            align-items: start;
        }

        /* Question sidebar / index panel */
        .question-sidebar {
            position: sticky;
            top: 90px;
        }

        .sidebar-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--gray);
            margin-bottom: 14px;
        }

        .q-index-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .q-index-btn {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
        }

        .q-index-btn.answered {
            background: #d1fae5;
            border-color: var(--success);
            color: #065f46;
        }

        .q-index-btn.current {
            background: var(--gradient-1);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .q-index-btn:hover:not(.current) {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== QUESTION CARD ===== */
        .question-main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-progress-card {
            padding: 20px 28px;
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-top .session-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--dark);
        }

        .progress-top .progress-count {
            font-size: 0.9rem;
            color: var(--gray);
            font-weight: 600;
        }

        .progress-bar-wrap {
            background: var(--light-gray);
            border-radius: 10px;
            overflow: hidden;
            height: 9px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* ===== QUESTION BODY CARD ===== */
        .question-body-card {
            padding: 40px 44px;
        }

        .question-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .q-number-badge {
            background: var(--gradient-1);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .q-points-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Question Text — Enhanced Typography */
        .q-text {
            font-size: 1.45rem;
            font-weight: 700;
            line-height: 1.65;
            color: var(--dark);
            margin-bottom: 32px;
            letter-spacing: -0.01em;
        }

        /* Saved answer indicator */
        .answer-saved-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #065f46;
            padding: 10px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* ===== MCQ OPTIONS ===== */
        .options-list {
            display: grid;
            gap: 14px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 18px 22px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: #fafbff;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            line-height: 1.5;
        }

        .option-btn:hover {
            border-color: var(--primary-light);
            background: #f0f1ff;
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.18);
        }

        .option-letter {
            min-width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--gray);
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-btn.selected .option-letter {
            background: var(--gradient-1);
            color: white;
        }

        /* ===== TRUE/FALSE BUTTONS ===== */
        .tf-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .tf-btn {
            padding: 22px 16px;
            border: 2px solid var(--border);
            border-radius: 18px;
            background: #fafbff;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .tf-btn:hover {
            border-color: var(--primary-light);
            background: #f0f1ff;
            transform: translateY(-3px);
        }

        .tf-btn.selected {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.2);
            transform: translateY(-3px);
        }

        .tf-btn[data-value="True"].selected {
            border-color: var(--success);
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            color: #065f46;
        }

        .tf-btn[data-value="False"].selected {
            border-color: var(--danger);
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            color: #991b1b;
        }

        .tf-icon {
            font-size: 2rem;
            line-height: 1;
        }

        /* ===== TEXT / NUMBER INPUTS ===== */
        .answer-textarea,
        .answer-number {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-family: inherit;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--dark);
            background: #fafbff;
            transition: all 0.3s;
            resize: vertical;
        }

        .answer-textarea:focus,
        .answer-number:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: white;
        }

        .answer-number {
            resize: none;
        }

        /* ===== NAVIGATION FOOTER ===== */
        .nav-footer {
            position: sticky;
            bottom: 0;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 50;
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
        }

        .nav-footer-left,
        .nav-footer-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-footer-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .quiz-layout {
                grid-template-columns: 1fr;
            }

            .question-sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .main {
                padding: 20px 16px;
            }

            .header {
                padding: 14px 16px;
            }

            .nav-footer {
                padding: 12px 16px;
            }

            .question-body-card {
                padding: 24px 20px;
            }

            .q-text {
                font-size: 1.2rem;
            }

            .sessions-grid {
                grid-template-columns: 1fr;
            }

            .tf-container {
                grid-template-columns: 1fr 1fr;
            }

            .nav-footer {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .btn {
                padding: 11px 16px;
                font-size: 0.88rem;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .debug-info {
            background: #fef3c7;
            border-left: 4px solid var(--warning);
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-family: monospace;
            display: none;
        }
    </style>
</head>

<body>

    <!-- ===== LOADING SCREEN ===== -->
    <div class="spinner-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div style="color: white; font-size: 1.2rem; font-weight: 600;">Loading EduBoard...</div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div id="app">

                    Next <i class="fas fa-chevron-right"></i>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle" style="color: var(--success);"></i>
        <span id="toastMessage"></span>
    </div>

    <script type="module">
        import {
            auth,
            db,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            signOut,
            getDoc,
            setDoc,
            doc,
            collection,
            query,
            where,
            getDocs,
            updateDoc
        } from './firebase-config.js';

        // ===== APP STATE =====
        window.appState = {
            currentStudent: null,
            studentProfile: null,
            studentGradeName: null,
            availableSessions: [],
            currentSession: null,
            questions: [],
            currentQIndex: 0,
            isSaving: false
        };

        // ===== UTILITIES =====

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            toastMsg.textContent = msg;
            toast.querySelector('i').className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
            toast.querySelector('i').style.color = isError ? 'var(--danger)' : 'var(--success)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ===== GRADE NAME LOOKUP =====
        async function getGradeName(gradeLevelId) {
            if (!gradeLevelId || gradeLevelId === 'Not specified') return 'Not specified';
            try {
                const gradeDoc = await getDoc(doc(db, 'grades', gradeLevelId));
                if (gradeDoc.exists()) {
                    const gradeData = gradeDoc.data();
                    return gradeData.nameEn || gradeData.nameAr || gradeLevelId;
                }
            } catch (e) {
                console.warn('Could not fetch grade name:', e);
            }
            return gradeLevelId;
        }

        // ===== QUIZ ACCESSIBILITY =====
        function isQuizAccessible(session) {
            const now = new Date();
            if (session.startTime && session.endTime) {
                let startTime, endTime;
                if (session.startTime.toDate) startTime = session.startTime.toDate();
                else if (session.startTime.seconds) startTime = new Date(session.startTime.seconds * 1000);
                else startTime = new Date(session.startTime);

                if (session.endTime.toDate) endTime = session.endTime.toDate();
                else if (session.endTime.seconds) endTime = new Date(session.endTime.seconds * 1000);
                else endTime = new Date(session.endTime);

                return now >= startTime && now <= endTime;
            }
            return session.isActive === true;
        }

        // ===== QUIZ STATUS =====
        function getQuizStatus(session, studentData) {
            if (studentData?.submitted) {
                return {
                    text: '✓ Completed',
                    class: 'status-completed'
                };
            }
            if (!isQuizAccessible(session)) {
                const now = new Date();
                let startTime, endTime;
                if (session.startTime) {
                    if (session.startTime.toDate) startTime = session.startTime.toDate();
                    else if (session.startTime.seconds) startTime = new Date(session.startTime.seconds * 1000);
                    else startTime = new Date(session.startTime);
                    if (now < startTime) return {
                        text: `🔒 Starts ${startTime.toLocaleTimeString()}`,
                        class: 'status-closed'
                    };
                }
                if (session.endTime) {
                    if (session.endTime.toDate) endTime = session.endTime.toDate();
                    else if (session.endTime.seconds) endTime = new Date(session.endTime.seconds * 1000);
                    else endTime = new Date(session.endTime);
                    if (now > endTime) return {
                        text: '⏰ Quiz Closed',
                        class: 'status-closed'
                    };
                }
                return {
                    text: '🔒 Not Available',
                    class: 'status-closed'
                };
            }
            if (studentData?.answers && Object.keys(studentData.answers).length > 0) {
                return {
                    text: '📝 In Progress',
                    class: 'status-inprogress'
                };
            }
            return {
                text: '🟢 Available',
                class: 'status-open'
            };
        }

        // ===== LOAD STUDENT SESSIONS =====
        async function loadStudentSessions() {
            const state = window.appState;
            let studentGradeValue = null;

            if (state.studentProfile?.gradeLevel) {
                const gradeName = await getGradeName(state.studentProfile.gradeLevel);
                studentGradeValue = gradeName;
                console.log('Student grade from gradeLevel reference:', studentGradeValue);
            } else if (state.studentProfile?.grade) {
                studentGradeValue = state.studentProfile.grade;
                console.log('Student grade from direct field:', studentGradeValue);
            }

            if (!studentGradeValue || studentGradeValue === 'Not specified') {
                showToast('Grade not specified. Please contact your teacher.', true);
                return [];
            }

            const sessionsRef = collection(db, 'sessions');
            const q = query(sessionsRef, where('grade', '==', studentGradeValue));
            const querySnap = await getDocs(q);
            console.log(`Found ${querySnap.size} sessions for grade: ${studentGradeValue}`);

            const sessions = [];
            for (const docSnap of querySnap.docs) {
                const sessionData = {
                    id: docSnap.id,
                    ...docSnap.data()
                };
                const studentProgressRef = doc(db, 'sessions', docSnap.id, 'students', state.currentStudent.docId);
                const progressSnap = await getDoc(studentProgressRef);
                const studentProgress = progressSnap.exists() ? progressSnap.data() : null;

                const questionsRef = collection(db, 'sessions', docSnap.id, 'questions');
                const questionsSnap = await getDocs(questionsRef);
                const questionCount = questionsSnap.size;

                let totalPoints = 0;
                questionsSnap.forEach(qDoc => {
                    totalPoints += qDoc.data().points || 0;
                });

                sessions.push({
                    ...sessionData,
                    studentProgress,
                    questionCount,
                    totalPoints
                });
            }

            // Sort: In progress → available → completed
            sessions.sort((a, b) => {
                const aSubmitted = a.studentProgress?.submitted;
                const bSubmitted = b.studentProgress?.submitted;
                if (aSubmitted && !bSubmitted) return 1;
                if (!aSubmitted && bSubmitted) return -1;
                const aAccessible = isQuizAccessible(a);
                const bAccessible = isQuizAccessible(b);
                if (aAccessible && !bAccessible) return -1;
                if (!aAccessible && bAccessible) return 1;
                return 0;
            });

            return sessions;
        }

        // ===== SHOW WELCOME DASHBOARD =====
        async function showWelcomeDashboard() {
            const state = window.appState;
            const ws = document.getElementById('welcomeScreen');
            const quizScreen = document.getElementById('quizScreen');
            const completionScreen = document.getElementById('completionScreen');
            const navFooter = document.getElementById('navFooter');

            ws.style.display = 'block';
            quizScreen.style.display = 'none';
            completionScreen.style.display = 'none';
            navFooter.style.display = 'none';

            let displayGrade = 'Not specified';
            if (state.studentProfile?.gradeLevel) {
                displayGrade = await getGradeName(state.studentProfile.gradeLevel);
            } else if (state.studentProfile?.grade) {
                displayGrade = state.studentProfile.grade;
            }

            const sessions = await loadStudentSessions();
            state.availableSessions = sessions;

            const studentName = state.studentProfile?.name || 'Student';
            const studentEmail = state.currentStudent?.email || '';

            let sessionsHtml = '';
            if (sessions.length === 0) {
                sessionsHtml = `
                <div class="glass-card" style="text-align: center; padding: 56px 40px;">
                    <i class="fas fa-folder-open" style="font-size: 3.5rem; color: var(--gray); opacity:0.5;"></i>
                    <h3 style="margin-top: 20px; font-size:1.4rem;">No Quizzes Available</h3>
                    <p style="color:var(--gray); margin-top:8px;">There are no quizzes for your grade (<strong>${escapeHtml(displayGrade)}</strong>) at the moment.</p>
                    <p style="margin-top: 8px; font-size: 0.85rem; color:var(--gray);">Please check with your teacher to create quizzes for your grade.</p>
                </div>
            `;
            } else {
                sessionsHtml = `<div class="sessions-grid">`;
                for (const session of sessions) {
                    const answeredCount = session.studentProgress?.answers ? Object.keys(session.studentProgress.answers).length : 0;
                    const totalQuestions = session.questionCount || 0;
                    const progressPercent = totalQuestions > 0 ? (answeredCount / totalQuestions) * 100 : 0;
                    const status = getQuizStatus(session, session.studentProgress);
                    const isAccessible = isQuizAccessible(session);
                    const isSubmitted = session.studentProgress?.submitted;

                    let startTimeStr = '',
                        endTimeStr = '';
                    if (session.startTime) {
                        if (session.startTime.toDate) startTimeStr = session.startTime.toDate().toLocaleString();
                        else if (session.startTime.seconds) startTimeStr = new Date(session.startTime.seconds * 1000).toLocaleString();
                        else startTimeStr = new Date(session.startTime).toLocaleString();
                    }
                    if (session.endTime) {
                        if (session.endTime.toDate) endTimeStr = session.endTime.toDate().toLocaleString();
                        else if (session.endTime.seconds) endTimeStr = new Date(session.endTime.seconds * 1000).toLocaleString();
                        else endTimeStr = new Date(session.endTime).toLocaleString();
                    }

                    sessionsHtml += `
                    <div class="quiz-card ${!isAccessible || isSubmitted ? 'disabled' : ''}"
                         onclick="${isAccessible && !isSubmitted ? `window.selectSession('${session.id}')` : ''}">
                        <span class="quiz-status ${status.class}">${status.text}</span>
                        <h3 style="margin: 10px 0 6px; font-size:1.15rem; font-weight:700;">${escapeHtml(session.title || 'Untitled Quiz')}</h3>
                        <p style="color: var(--primary); font-size: 0.88rem; font-weight:600;">${escapeHtml(session.subject || 'General')}</p>
                        <p style="color: var(--gray); font-size: 0.85rem; margin-top: 8px; line-height:1.5;">${escapeHtml(session.instructions || 'No description')}</p>

                        ${totalQuestions > 0 ? `
                        <div class="quiz-progress">
                            <div class="quiz-progress-bar" style="width: ${progressPercent}%;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--gray); font-weight:600;">
                            <span>📊 ${answeredCount}/${totalQuestions} answered</span>
                            <span>⭐ ${session.totalPoints || 0} pts</span>
                        </div>
                        ` : '<div style="margin: 14px 0; font-size:0.88rem;"><em style="color:var(--gray);">No questions added yet</em></div>'}

                        ${startTimeStr && endTimeStr ? `
                        <div style="margin-top: 14px; font-size: 0.75rem; color: var(--gray); padding-top:12px; border-top:1px solid var(--border);">
                            <i class="far fa-clock"></i> ${startTimeStr} — ${endTimeStr}
                        </div>
                        ` : ''}
                    </div>
                `;
                }
                sessionsHtml += `</div>`;
            }

            ws.innerHTML = `
            <div class="dashboard-grid">
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="profile-info">
                        <h2>${escapeHtml(studentName)}</h2>
                        <p><i class="fas fa-envelope" style="opacity:0.7;"></i> ${escapeHtml(studentEmail)}</p>
                        <div class="grade-tag">
                            <i class="fas fa-layer-group"></i> Grade: ${escapeHtml(displayGrade)}
                        </div>
                    </div>
                </div>

                <div class="glass-card" style="padding: 36px 40px;">
                    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:4px;">
                        <h3 style="font-size:1.3rem; font-weight:800;"><i class="fas fa-chalkboard" style="color:var(--primary);"></i> Available Quizzes</h3>
                        <span style="font-size:0.85rem; color:var(--gray);">${sessions.length} quiz${sessions.length !== 1 ? 'zes' : ''} found</span>
                    </div>
                    <p style="color: var(--gray); margin-top: 4px; margin-bottom:0; font-size:0.9rem;">Select a quiz to begin or continue your session</p>
                    ${sessionsHtml}
                </div>
            </div>
        `;
        }

        // ===== SELECT SESSION =====
        window.selectSession = async function(sessionId) {
            const state = window.appState;
            const session = state.availableSessions.find(s => s.id === sessionId);

            if (!session) {
                showToast('Session not found', true);
                return;
            }
            if (!isQuizAccessible(session)) {
                showToast('This quiz is not available at this time', true);
                return;
            }
            if (session.studentProgress?.submitted) {
                showToast('You have already completed this quiz', true);
                return;
            }

            state.currentSession = session;

            const questionsRef = collection(db, 'sessions', sessionId, 'questions');
            const questionsSnap = await getDocs(questionsRef);
            state.questions = [];
            questionsSnap.forEach(doc => {
                state.questions.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            state.questions.sort((a, b) => (a.order || 0) - (b.order || 0));

            if (state.questions.length === 0) {
                showToast('This quiz has no questions yet', true);
                return;
            }

            // Find first unanswered question
            const answers = session.studentProgress?.answers || {};
            let startIndex = 0;
            for (let i = 0; i < state.questions.length; i++) {
                if (!answers[state.questions[i].id]) {
                    startIndex = i;
                    break;
                }
            }
            state.currentQIndex = startIndex;

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            document.getElementById('navFooter').style.display = 'flex';
            await renderQuestion();
        };

        // ===== GET CURRENT ANSWER =====
        function getCurrentAnswer() {
            const state = window.appState;
            if (!state.questions.length) return null;
            const q = state.questions[state.currentQIndex];

            if (q.type === 'mcq') {
                const selected = document.querySelector('.option-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            if (q.type === 'truefalse') {
                const selected = document.querySelector('.tf-btn.selected');
                return selected ? selected.getAttribute('data-value') : null;
            }
            const inputEl = document.getElementById('answerInput');
            return inputEl && inputEl.value.trim() ? inputEl.value.trim() : null;
        }

        // ===== SAVE ANSWER =====
window.saveCurrentAnswer = async function() {
    const state = window.appState;
    if (state.isSaving) return;

    const answer = getCurrentAnswer();
    if (!answer) { showToast('Please provide an answer first', true); return; }

    const q = state.questions[state.currentQIndex];
    const saveBtn = document.getElementById('btnSave');

    state.isSaving = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    saveBtn.disabled = true;

    try {
        const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);

        // ✅ Use setDoc with merge:true — creates the doc if it doesn't exist, updates if it does
        await setDoc(studentRef, { [`answers.${q.id}`]: answer }, { merge: true });

        showToast('Answer saved!', false);
        saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved';

        setTimeout(() => {
            if (saveBtn) {
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Answer';
                saveBtn.disabled = false;
            }
        }, 1500);

        if (!state.currentSession.studentProgress) {
            state.currentSession.studentProgress = { answers: {} };
        }
        state.currentSession.studentProgress.answers[q.id] = answer;

        updateQuestionIndex();

    } catch (err) {
        console.error('Save error:', err);
        showToast('Failed to save', true);
        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Answer';
        saveBtn.disabled = false;
    } finally {
        state.isSaving = false;
    }
};
        // ===== NAVIGATION =====
        window.prevQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex > 0) {
                state.currentQIndex--;
                await renderQuestion();
            }
        };

        window.nextQuestion = async function() {
            const state = window.appState;
            if (state.currentQIndex < state.questions.length - 1) {
                state.currentQIndex++;
                await renderQuestion();
            }
        };

        // Jump to question from index panel
        window.jumpToQuestion = async function(idx) {
            window.appState.currentQIndex = idx;
            await renderQuestion();
        };

        // ===== FINISH QUIZ =====
window.finishQuiz = async function() {
    const state = window.appState;

    // Save current answer if any
    const currentAnswer = getCurrentAnswer();
    if (currentAnswer) {
        const q = state.questions[state.currentQIndex];
        const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
        // ✅ setDoc with merge
        await setDoc(studentRef, { [`answers.${q.id}`]: currentAnswer }, { merge: true });
    }

    // Verify all questions answered
    const studentRef = doc(db, 'sessions', state.currentSession.id, 'students', state.currentStudent.docId);
    const snap = await getDoc(studentRef);
    const answersMap = snap.exists() ? snap.data().answers || {} : {};

    const missingQuestions = [];
    for (let i = 0; i < state.questions.length; i++) {
        if (!answersMap[state.questions[i].id]) missingQuestions.push(i + 1);
    }

    if (missingQuestions.length > 0) {
        showToast(`Please answer questions: ${missingQuestions.join(', ')}`, true);
        state.currentQIndex = missingQuestions[0] - 1;
        await renderQuestion();
        return;
    }

    // ✅ setDoc with merge for submission flag
    await setDoc(studentRef, { submitted: true, submittedAt: Date.now() }, { merge: true });
    showToast('Quiz submitted successfully! 🎉');
    await showWelcomeDashboard();
};
        // ===== UPDATE QUESTION INDEX BUTTONS =====
        function updateQuestionIndex() {
            const state = window.appState;
            const answers = state.currentSession.studentProgress?.answers || {};
            document.querySelectorAll('.q-index-btn').forEach((btn, i) => {
                btn.classList.remove('current', 'answered');
                if (i === state.currentQIndex) btn.classList.add('current');
                else if (answers[state.questions[i]?.id]) btn.classList.add('answered');
            });
        }

        // ===== RENDER QUESTION =====
        async function renderQuestion() {
            const state = window.appState;
            if (!state.questions.length) return;

            const q = state.questions[state.currentQIndex];
            const existingAnswer = state.currentSession.studentProgress?.answers?.[q.id];
            const total = state.questions.length;
            const answeredCount = state.currentSession.studentProgress?.answers ?
                Object.keys(state.currentSession.studentProgress.answers).length : 0;
            const answers = state.currentSession.studentProgress?.answers || {};

            // Build question index sidebar
            let indexHtml = '';
            for (let i = 0; i < total; i++) {
                const isAnswered = !!answers[state.questions[i].id];
                const isCurrent = i === state.currentQIndex;
                indexHtml += `
                <button class="q-index-btn ${isCurrent ? 'current' : isAnswered ? 'answered' : ''}"
                        onclick="window.jumpToQuestion(${i})" title="Question ${i + 1}">
                    ${i + 1}
                </button>
            `;
            }

            // Build answer input HTML
            let inputHtml = '';
            if (q.type === 'mcq' && q.options?.length) {
                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                inputHtml = `<div class="options-list">` +
                    q.options.map((opt, idx) => `
                    <button class="option-btn ${existingAnswer === opt ? 'selected' : ''}"
                            data-value="${escapeHtml(opt)}"
                            onclick="event.preventDefault(); document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <span class="option-letter">${letters[idx]}</span>
                        <span>${escapeHtml(opt)}</span>
                    </button>
                `).join('') + `</div>`;
            } else if (q.type === 'truefalse') {
                inputHtml = `
                <div class="tf-container">
                    <button class="tf-btn ${existingAnswer === 'True' ? 'selected' : ''}" data-value="True"
                            onclick="event.preventDefault(); document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <span class="tf-icon">✅</span>
                        <span>True</span>
                    </button>
                    <button class="tf-btn ${existingAnswer === 'False' ? 'selected' : ''}" data-value="False"
                            onclick="event.preventDefault(); document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                        <span class="tf-icon">❌</span>
                        <span>False</span>
                    </button>
                </div>
            `;
            } else if (q.type === 'number') {
                inputHtml = `<input class="answer-number" id="answerInput" type="number" placeholder="Enter your numeric answer..." value="${existingAnswer || ''}">`;
            } else {
                inputHtml = `<textarea class="answer-textarea" id="answerInput" rows="5" placeholder="Write your answer here...">${existingAnswer || ''}</textarea>`;
            }

            const quizScreen = document.getElementById('quizScreen');
            quizScreen.innerHTML = `
            <div class="quiz-layout">

                <!-- Question Index Sidebar -->
                <div class="question-sidebar">
                    <div class="glass-card" style="padding: 24px;">
                        <p class="sidebar-title"><i class="fas fa-list-ol"></i> Questions</p>
                        <div class="q-index-grid">${indexHtml}</div>
                        <div style="font-size:0.8rem; color:var(--gray); margin-top:4px;">
                            <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                                <div style="width:12px;height:12px;border-radius:3px;background:var(--gradient-1);"></div> Current
                            </div>
                            <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                                <div style="width:12px;height:12px;border-radius:3px;background:#d1fae5;border:1px solid var(--success);"></div> Answered
                            </div>
                            <div style="display:flex; align-items:center; gap:6px;">
                                <div style="width:12px;height:12px;border-radius:3px;background:white;border:1px solid var(--border);"></div> Not answered
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Question Main Area -->
                <div class="question-main">

                    <!-- Progress Bar Card -->
                    <div class="glass-card question-progress-card">
                        <div class="progress-top">
                            <span class="session-title"><i class="fas fa-book-open" style="color:var(--primary);margin-right:8px;"></i>${escapeHtml(state.currentSession.title)}</span>
                            <span class="progress-count">${answeredCount} / ${total} Answered</span>
                        </div>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar-fill" style="width: ${(answeredCount / total) * 100}%;"></div>
                        </div>
                    </div>

                    <!-- Question Body Card -->
                    <div class="glass-card question-body-card">
                        <div class="question-meta">
                            <span class="q-number-badge">Question ${state.currentQIndex + 1} of ${total}</span>
                            <span class="q-points-badge">⭐ ${q.points || 0} pts</span>
                        </div>

                        <div class="q-text">${escapeHtml(q.text)}</div>

                        ${existingAnswer ? `
                            <div class="answer-saved-badge">
                                <i class="fas fa-check-circle"></i>
                                Answer saved — you can still change it
                            </div>
                        ` : ''}

                        ${inputHtml}
                    </div>

                </div>
            </div>
        `;

            // Update nav footer buttons
            const prevBtn = document.getElementById('btnPrev');
            const nextBtn = document.getElementById('btnNext');
            const finishBtn = document.getElementById('btnFinish');

            if (prevBtn) prevBtn.disabled = (state.currentQIndex === 0);
            if (nextBtn) nextBtn.style.display = (state.currentQIndex < total - 1) ? 'inline-flex' : 'none';
            if (finishBtn) finishBtn.style.display = (state.currentQIndex === total - 1) ? 'inline-flex' : 'none';

            // Render MathJax if present
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([quizScreen]).catch(e => console.warn(e));
            }
        }

        // ===== LOGIN =====
        window.doStudentLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errDiv = document.getElementById('loginErr');
            const btn = event?.target;

            if (!email || !pass) {
                errDiv.textContent = 'Please enter email and password';
                errDiv.style.display = 'block';
                return;
            }

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errDiv.textContent = 'Invalid email or password';
                errDiv.style.display = 'block';
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            }
        };

        // ===== LOGOUT =====
        window.exitSession = async function() {
            await signOut(auth);
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginErr').style.display = 'none';
            showToast('Logged out successfully');
        };

        // Enter key on password field
        document.getElementById('loginPass')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.doStudentLogin();
        });

        // ===== AUTH STATE OBSERVER =====
        onAuthStateChanged(auth, async (user) => {
            document.getElementById('loadingScreen').style.display = 'none';

            if (!user) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                return;
            }

            document.getElementById('loadingScreen').style.display = 'flex';

            try {
                const studentsRef = collection(db, 'students');
                const q = query(studentsRef, where('uid', '==', user.uid));
                const querySnap = await getDocs(q);

                let studentData = null;
                let studentDocId = null;

                if (!querySnap.empty) {
                    studentDocId = querySnap.docs[0].id;
                    studentData = querySnap.docs[0].data();
                    console.log('Student data loaded:', studentData);
                } else {
                    const directSnap = await getDoc(doc(db, 'students', user.uid));
                    if (directSnap.exists()) {
                        studentDocId = user.uid;
                        studentData = directSnap.data();
                    }
                }

                if (!studentData) throw new Error('Student profile not found');

                window.appState.currentStudent = user;
                window.appState.studentProfile = studentData;
                window.appState.currentStudent.docId = studentDocId;

                document.getElementById('studentName').textContent = studentData.name || user.email;
                document.getElementById('studentAvatar').innerHTML = (studentData.name || 'S').charAt(0).toUpperCase();

                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                await showWelcomeDashboard();

            } catch (err) {
                console.error('Error:', err);
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                const errDiv = document.getElementById('loginErr');
                errDiv.textContent = err.message;
                errDiv.style.display = 'block';
                await signOut(auth);
            }
        });
    </script>
</body>

</html>
