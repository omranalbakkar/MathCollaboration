<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EduBoard — Fullscreen Interactive Quiz Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- MathJax for clean math rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['\\[', '\\]']
                ]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-glow: #818cf8;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray-dark: #334155;
            --gray: #64748b;
            --light-bg: #f8fafc;
            --border: #e2e8f0;
            --success: #10b981;
            --grad-1: linear-gradient(145deg, #6366f1 0%, #a855f7 100%);
            --grad-2: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, rgba(168, 85, 247, 0.05) 100%),
                linear-gradient(112deg, #f1f5f9 0%, #eef2ff 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* FULLSCREEN WIDE LAYOUT */
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            width: 100%;
        }

        @media (min-width: 1920px) {
            .app-container {
                max-width: 1800px;
                padding: 2rem 3rem;
            }
        }

        /* glassmorphism refined */
        .glass-panel {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }

        .btn {
            border: none;
            border-radius: 2rem;
            padding: 0.75rem 1.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: inherit;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background: var(--grad-1);
            color: white;
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(79, 70, 229, 0.4);
        }

        .btn-outline {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding: 1rem 0;
        }

        .question-card {
            transition: all 0.2s;
            animation: fadeSlide 0.4s ease-out;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-btn,
        .tf-btn {
            width: 100%;
            text-align: left;
            background: var(--light-bg);
            border: 2px solid var(--border);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .option-btn.selected,
        .tf-btn.selected {
            background: #e0e7ff;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
            color: var(--primary-dark);
        }

        .option-btn:hover:not(.selected),
        .tf-btn:hover:not(.selected) {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: scale(0.99);
        }

        .quiz-card {
            background: white;
            border-radius: 1.8rem;
            padding: 1.5rem;
            transition: all 0.25s;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .quiz-card:hover:not(.disabled) {
            transform: translateY(-6px);
            box-shadow: var(--card-shadow);
            border-color: var(--primary-glow);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .header-bar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 2rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .toast-notify {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 0.8rem 1.6rem;
            border-radius: 2rem;
            font-weight: 500;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 12px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .toast-notify.show {
            transform: translateX(0);
        }

        input,
        textarea {
            font-family: 'Inter', monospace;
            border: 2px solid var(--border);
            border-radius: 1.5rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .progress-section {
            background: var(--light-bg);
            border-radius: 1.5rem;
            padding: 0.5rem;
        }

        .grid-sessions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.8rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }

            .btn {
                padding: 0.6rem 1.2rem;
            }
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- LOADING OVERLAY -->
    <div id="globalLoader" style="position:fixed; inset:0; background:var(--grad-1); display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; gap:1rem;">
        <div class="spinner" style="width:48px; height:48px;"></div>
        <p style="color:white; font-weight:600;">Launching EduBoard...</p>
    </div>

    <!-- LOGIN MODAL-LIKE CARD (fullscreen flex) -->
    <div id="loginScreen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(125deg, #4f46e5, #a855f7); padding:1rem;">
        <div class="glass-panel" style="max-width:480px; width:100%; padding:2.5rem; text-align:center;">
            <i class="fas fa-chalkboard-user" style="font-size:3rem; color:var(--primary);"></i>
            <h2 style="margin:1rem 0 0.5rem;">Welcome to EduBoard</h2>
            <p style="color:var(--gray); margin-bottom:2rem;">Sign in to unlock fullscreen quizzes</p>
            <div style="margin-bottom:1rem;">
                <input type="email" id="loginEmail" placeholder="student@example.com" style="margin-bottom:1rem;">
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width:100%; justify-content:center;" id="loginBtn">Sign In →</button>
            <div id="loginErrorMsg" style="margin-top:1rem; color:#dc2626; font-size:0.85rem; display:none;"></div>
            <div style="margin-top:1.5rem; font-size:0.75rem; color:var(--gray);">Demo: student@demo.com / any password (mock)</div>
        </div>
    </div>

    <!-- MAIN APP (full width) -->
    <div id="app" style="display:none;">
        <div class="header-bar">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <i class="fas fa-graduation-cap" style="font-size:1.8rem; background:var(--grad-1); -webkit-background-clip:text; background-clip:text; color:transparent;"></i>
                    <span style="font-weight:800; font-size:1.5rem;">EduBoard</span>
                </div>
                <div style="display:flex; align-items:center; gap:1rem;">
                    <div style="background:#f1f5f9; padding:0.4rem 1rem; border-radius:3rem; display:flex; align-items:center; gap:0.6rem;">
                        <i class="fas fa-user-circle" style="font-size:1.3rem;"></i>
                        <span id="studentNameDisplay">Student</span>
                        <span id="gradeBadge" style="background:#e2e8f0; padding:0.2rem 0.6rem; border-radius:2rem; font-size:0.7rem;"></span>
                    </div>
                    <button id="logoutBtnGlobal" class="btn btn-danger" style="padding:0.5rem 1.2rem;">Logout</button>
                </div>
            </div>
        </div>

        <div class="app-container">
            <!-- DASHBOARD (welcome) -->
            <div id="dashboardView"></div>

            <!-- QUIZ VIEW (dynamic) -->
            <div id="quizView" style="display:none;"></div>

            <!-- Completion / summary area -->
            <div id="completionView" style="display:none;"></div>

            <!-- Navigation footer (wide buttons) -->
            <div id="quizNavFooter" style="display:none; margin-top:2rem;" class="glass-panel" style="padding:1rem 1.5rem;">
                <div class="nav-buttons">
                    <button id="navPrevBtn" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Previous</button>
                    <div style="display:flex; gap:1rem;">
                        <button id="navSaveBtn" class="btn btn-primary"><i class="fas fa-save"></i> Save Answer</button>
                        <button id="navNextBtn" class="btn btn-outline">Next <i class="fas fa-arrow-right"></i></button>
                        <button id="navFinishBtn" class="btn btn-success" style="display:none;"><i class="fas fa-check-double"></i> Submit Quiz</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-notify"><i class="fas fa-info-circle"></i> <span id="toastText"></span></div>

    <script>
        // -------------------- MOCK DATA + FULL UI STATE (standalone no firebase, but full experience)
        // Using local storage simulation for student sessions & answers
        const MOCK_STUDENTS = {
            "student@demo.com": {
                name: "Alex Rivera",
                gradeLevel: "Grade 10",
                uid: "demo_uid_001"
            }
        };

        // Mock sessions (Grade 10 focused)
        const MOCK_SESSIONS = [{
                id: "sess_math_01",
                title: "Algebra Essentials",
                subject: "Mathematics",
                instructions: "Solve rational equations step by step.",
                grade: "Grade 10",
                startTime: new Date(Date.now() - 3600000).toISOString(), // started 1h ago
                endTime: new Date(Date.now() + 86400000).toISOString(),
                isActive: true,
                questions: [{
                        id: "q1",
                        text: "Solve the rational equation: \\( y = \\frac{7}{y-3} \\)",
                        type: "mcq",
                        points: 2,
                        options: ["y = -4", "y = 4", "y = -2", "y = 2"],
                        correct: "y = 4"
                    },
                    {
                        id: "q2",
                        text: "Find the value of \\( x \\) in \\( \\frac{2x}{x-1} = 3 \\)",
                        type: "mcq",
                        points: 2,
                        options: ["x = 3", "x = 2", "x = -3", "x = 1.5"],
                        correct: "x = 3"
                    },
                    {
                        id: "q3",
                        text: "Simplify: \\( \\frac{x^2 - 1}{x+1} \\) for \\( x \\neq -1 \\)",
                        type: "short",
                        points: 1
                    },
                    {
                        id: "q4",
                        text: "Is \\( \\frac{5}{y} = \\frac{10}{2y} \\) an identity? (True/False)",
                        type: "truefalse",
                        points: 1
                    }
                ]
            },
            {
                id: "sess_sci_02",
                title: "Physics Fundamentals",
                subject: "Science",
                instructions: "Newton's laws and motion problems.",
                grade: "Grade 10",
                startTime: new Date(Date.now() - 7200000).toISOString(),
                endTime: new Date(Date.now() + 172800000).toISOString(),
                isActive: true,
                questions: [{
                        id: "q1_phys",
                        text: "What is the SI unit of force?",
                        type: "mcq",
                        points: 1,
                        options: ["Joule", "Newton", "Watt", "Pascal"],
                        correct: "Newton"
                    },
                    {
                        id: "q2_phys",
                        text: "Acceleration due to gravity (approx) is 9.8 m/s².",
                        type: "truefalse",
                        points: 1
                    }
                ]
            }
        ];

        // Student progress storage (answers + submitted)
        let studentProgressMap = {}; // key: sessionId, value: { answers: {qId: answer}, submitted: bool }

        // App state
        let currentStudent = null;
        let currentStudentGrade = null;
        let availableSessions = [];
        let activeSession = null;
        let currentQuestions = [];
        let currentQIndex = 0;
        let isSavingFlag = false;

        // Helper UI
        function showToast(message, isError = false) {
            const toast = document.getElementById("toastMsg");
            const toastSpan = document.getElementById("toastText");
            toastSpan.innerHTML = message;
            toast.querySelector("i").className = isError ? "fas fa-exclamation-triangle" : "fas fa-check-circle";
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2800);
        }

        function renderMath() {
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise().catch(e => console.warn);
            }
        }

        function getStudentProgress(sessionId) {
            if (!studentProgressMap[sessionId]) {
                studentProgressMap[sessionId] = {
                    answers: {},
                    submitted: false
                };
            }
            return studentProgressMap[sessionId];
        }

        // Load available sessions based on student grade (Grade 10)
        function loadSessionsForStudent() {
            if (!currentStudentGrade) return [];
            return MOCK_SESSIONS.filter(s => s.grade === currentStudentGrade);
        }

        function isQuizAccessible(session) {
            const now = new Date();
            const start = new Date(session.startTime);
            const end = new Date(session.endTime);
            return now >= start && now <= end && session.isActive;
        }

        function getQuizStatus(session) {
            const prog = getStudentProgress(session.id);
            if (prog.submitted) return {
                text: "✓ Completed",
                class: "status-completed",
                bg: "#e0e7ff",
                color: "#3730a3"
            };
            if (!isQuizAccessible(session)) return {
                text: "🔒 Locked",
                class: "status-closed",
                bg: "#fee2e2",
                color: "#991b1b"
            };
            const answeredCount = Object.keys(prog.answers).length;
            if (answeredCount > 0) return {
                text: `📝 In Progress (${answeredCount}/${session.questions.length})`,
                class: "status-inprogress",
                bg: "#fed7aa",
                color: "#9a3412"
            };
            return {
                text: "🟢 Available",
                class: "status-open",
                bg: "#d1fae5",
                color: "#065f46"
            };
        }

        // Dashboard Render (WIDE)
        function renderDashboard() {
            const dashboardDiv = document.getElementById("dashboardView");
            const quizView = document.getElementById("quizView");
            const completionDiv = document.getElementById("completionView");
            const navFooter = document.getElementById("quizNavFooter");
            quizView.style.display = "none";
            completionDiv.style.display = "none";
            dashboardDiv.style.display = "block";
            navFooter.style.display = "none";

            const sessions = loadSessionsForStudent();
            availableSessions = sessions;
            if (sessions.length === 0) {
                dashboardDiv.innerHTML = `<div class="glass-panel" style="padding:3rem; text-align:center;"><i class="fas fa-folder-open fa-3x"></i><h3>No quizzes available for your grade</h3><p>Check back later.</p></div>`;
                return;
            }

            let sessionsHtml = `<div class="grid-sessions">`;
            sessions.forEach(session => {
                const prog = getStudentProgress(session.id);
                const answeredCount = Object.keys(prog.answers).length;
                const total = session.questions.length;
                const percent = total ? (answeredCount / total) * 100 : 0;
                const status = getQuizStatus(session);
                const disabled = prog.submitted || !isQuizAccessible(session);
                sessionsHtml += `
                <div class="quiz-card ${disabled ? 'disabled' : ''}" style="${disabled ? 'opacity:0.7' : ''}" data-session-id="${session.id}">
                    <div class="status-badge" style="background:${status.bg}; color:${status.color};">${status.text}</div>
                    <h3 style="margin:12px 0 4px;">${escapeHtml(session.title)}</h3>
                    <p style="color:var(--gray); font-size:0.85rem;">${escapeHtml(session.subject)} • ${total} questions</p>
                    <p style="font-size:0.8rem; margin:10px 0;">${escapeHtml(session.instructions.substring(0,80))}</p>
                    <div class="progress-section" style="margin:12px 0;">
                        <div style="background:#e2e8f0; border-radius:20px; height:6px; overflow:hidden;"><div style="width:${percent}%; background:var(--primary); height:6px;"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-top:6px;"><span>${answeredCount}/${total} answered</span><span>⭐ ${session.questions.reduce((a,q)=>a+(q.points||0),0)} pts</span></div>
                    </div>
                    ${!disabled ? `<button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="window.startQuiz('${session.id}')">Start / Resume <i class="fas fa-arrow-right"></i></button>` : `<button disabled style="width:100%; margin-top:8px;" class="btn btn-outline" disabled>${prog.submitted ? 'Completed' : 'Unavailable'}</button>`}
                </div>
            `;
            });
            sessionsHtml += `</div>`;
            dashboardDiv.innerHTML = `
            <div class="glass-panel" style="padding:2rem; margin-bottom:2rem;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <div><h2><i class="fas fa-rocket"></i> Welcome, ${escapeHtml(currentStudent?.name || "Learner")}</h2><p>Grade: ${escapeHtml(currentStudentGrade)} • Interactive fullscreen learning</p></div>
                    <div><i class="fas fa-chart-line" style="font-size:2rem; color:var(--primary);"></i></div>
                </div>
            </div>
            <div class="glass-panel" style="padding:2rem;">
                <h3><i class="fas fa-calendar-alt"></i> Active Quizzes</h3>
                ${sessionsHtml}
            </div>
        `;
        }

        window.startQuiz = function(sessionId) {
            const session = availableSessions.find(s => s.id === sessionId);
            if (!session) return;
            if (getStudentProgress(session.id).submitted) {
                showToast("Quiz already submitted!", true);
                return;
            }
            if (!isQuizAccessible(session)) {
                showToast("Quiz time window closed", true);
                return;
            }

            activeSession = session;
            currentQuestions = [...session.questions];
            const progress = getStudentProgress(session.id);
            // find first unanswered index
            let startIdx = 0;
            for (let i = 0; i < currentQuestions.length; i++) {
                if (!progress.answers[currentQuestions[i].id]) {
                    startIdx = i;
                    break;
                }
            }
            currentQIndex = startIdx;
            renderQuizInterface();
        };

        function getCurrentAnswerValue() {
            const q = currentQuestions[currentQIndex];
            if (!q) return null;
            if (q.type === "mcq") {
                const selected = document.querySelector('.option-btn.selected');
                return selected ? selected.getAttribute("data-value") : null;
            } else if (q.type === "truefalse") {
                const selected = document.querySelector('.tf-btn.selected');
                return selected ? selected.getAttribute("data-value") : null;
            } else {
                const inputField = document.getElementById("freeAnswerInput");
                return inputField ? inputField.value.trim() : null;
            }
        }

        async function saveCurrentAnswer() {
            if (isSavingFlag) return;
            const answer = getCurrentAnswerValue();
            if (!answer && currentQuestions[currentQIndex].type !== "short") {
                showToast("Please select or enter an answer", true);
                return;
            }
            if (!answer && currentQuestions[currentQIndex].type === "short" && answer === "") {
                showToast("Please enter your answer", true);
                return;
            }
            isSavingFlag = true;
            const saveBtn = document.getElementById("navSaveBtn");
            const originalHtml = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving';
            saveBtn.disabled = true;

            setTimeout(() => {
                const q = currentQuestions[currentQIndex];
                const progress = getStudentProgress(activeSession.id);
                if (answer) progress.answers[q.id] = answer;
                studentProgressMap[activeSession.id] = progress;
                showToast("Answer saved!");
                saveBtn.innerHTML = originalHtml;
                saveBtn.disabled = false;
                isSavingFlag = false;
                renderQuizInterface(true); // refresh to show saved badge
            }, 200);
        }

        function renderQuizInterface(keepIndex = false) {
            const dashboardDiv = document.getElementById("dashboardView");
            const quizDiv = document.getElementById("quizView");
            const completionDiv = document.getElementById("completionView");
            const navFooter = document.getElementById("quizNavFooter");
            dashboardDiv.style.display = "none";
            completionDiv.style.display = "none";
            quizDiv.style.display = "block";
            navFooter.style.display = "flex";

            const q = currentQuestions[currentQIndex];
            const progress = getStudentProgress(activeSession.id);
            const savedAns = progress.answers[q.id];
            const total = currentQuestions.length;
            const answeredCount = Object.keys(progress.answers).length;

            let inputHtml = "";
            if (q.type === "mcq" && q.options) {
                const letters = ["A", "B", "C", "D"];
                inputHtml = `<div>${q.options.map((opt, idx) => `
                <button class="option-btn ${savedAns === opt ? 'selected' : ''}" data-value="${escapeHtml(opt)}" onclick="event.preventDefault(); document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">
                    <span style="font-weight:800;">${letters[idx]}</span> ${escapeHtml(opt)}
                </button>
            `).join('')}</div>`;
            } else if (q.type === "truefalse") {
                inputHtml = `<div style="display:flex; gap:1rem;">
                <button class="tf-btn ${savedAns === 'True' ? 'selected' : ''}" data-value="True" onclick="document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">✅ True</button>
                <button class="tf-btn ${savedAns === 'False' ? 'selected' : ''}" data-value="False" onclick="document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected');">❌ False</button>
            </div>`;
            } else {
                inputHtml = `<textarea id="freeAnswerInput" rows="3" placeholder="Write your solution...">${savedAns || ''}</textarea>`;
            }

            quizDiv.innerHTML = `
            <div class="glass-panel" style="padding:1.5rem; margin-bottom:1.5rem;">
                <div style="display:flex; justify-content:space-between; flex-wrap:wrap;"><span><strong>${escapeHtml(activeSession.title)}</strong></span><span>✅ ${answeredCount}/${total} answered</span></div>
                <div style="background:#e2e8f0; border-radius:30px; margin-top:8px;"><div style="width:${(answeredCount/total)*100}%; background:var(--grad-1); height:6px; border-radius:30px;"></div></div>
            </div>
            <div class="glass-panel question-card" style="padding:2rem;">
                <div style="display:flex; gap:0.8rem; align-items:center; margin-bottom:1rem;"><span class="status-badge" style="background:#e0e7ff;">Q${currentQIndex+1}/${total}</span><span>⭐ ${q.points || 1} pt(s)</span></div>
                <div class="q-text" style="font-size:1.3rem; font-weight:600; margin-bottom:1.5rem;">${escapeHtml(q.text)}</div>
                ${savedAns ? `<div style="background:#dcfce7; padding:0.5rem 1rem; border-radius:2rem; margin-bottom:1rem;"><i class="fas fa-check-circle"></i> Previously saved answer</div>` : ''}
                ${inputHtml}
            </div>
        `;

            const prevBtn = document.getElementById("navPrevBtn");
            const nextBtn = document.getElementById("navNextBtn");
            const finishBtn = document.getElementById("navFinishBtn");
            prevBtn.onclick = () => {
                if (currentQIndex > 0) {
                    currentQIndex--;
                    renderQuizInterface();
                }
            };
            nextBtn.onclick = () => {
                if (currentQIndex < total - 1) {
                    currentQIndex++;
                    renderQuizInterface();
                }
            };
            finishBtn.onclick = () => submitQuizFinal();

            if (currentQIndex === total - 1) {
                finishBtn.style.display = "inline-flex";
                nextBtn.style.display = "none";
            } else {
                finishBtn.style.display = "none";
                nextBtn.style.display = "inline-flex";
            }
            if (currentQIndex === 0) prevBtn.disabled = true;
            else prevBtn.disabled = false;

            document.getElementById("navSaveBtn").onclick = () => saveCurrentAnswer();
            renderMath();
        }

        async function submitQuizFinal() {
            const progress = getStudentProgress(activeSession.id);
            const allAnswered = currentQuestions.every(q => progress.answers[q.id]);
            if (!allAnswered) {
                showToast("Please answer all questions before submitting.", true);
                return;
            }
            progress.submitted = true;
            studentProgressMap[activeSession.id] = progress;
            showToast("Quiz submitted! 🎉");
            renderDashboard();
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Login simulation
        function initLogin() {
            const loginBtn = document.getElementById("loginBtn");
            loginBtn.onclick = () => {
                const email = document.getElementById("loginEmail").value.trim();
                const pass = document.getElementById("loginPass").value;
                const errDiv = document.getElementById("loginErrorMsg");
                if (!email) {
                    errDiv.innerText = "Enter email";
                    errDiv.style.display = "block";
                    return;
                }
                const mockUser = MOCK_STUDENTS[email];
                if (mockUser) {
                    currentStudent = {
                        name: mockUser.name,
                        email: email,
                        uid: mockUser.uid
                    };
                    currentStudentGrade = mockUser.gradeLevel;
                    document.getElementById("studentNameDisplay").innerText = mockUser.name;
                    document.getElementById("gradeBadge").innerText = mockUser.gradeLevel;
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("app").style.display = "block";
                    renderDashboard();
                    showToast(`Welcome back, ${mockUser.name}!`);
                } else {
                    errDiv.innerText = "Demo credentials: student@demo.com / anything";
                    errDiv.style.display = "block";
                }
            };
            document.getElementById("logoutBtnGlobal").onclick = () => {
                currentStudent = null;
                document.getElementById("app").style.display = "none";
                document.getElementById("loginScreen").style.display = "flex";
                showToast("Logged out");
            };
            document.getElementById("loginPass").addEventListener("keypress", (e) => {
                if (e.key === "Enter") loginBtn.click();
            });
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById("globalLoader").style.display = "none";
            }, 500);
            initLogin();
        };
    </script>
</body>

</html>
